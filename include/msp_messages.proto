// Notes: Expects 21 bytes. Calls `setWaypoint()`. If `USE_FW_AUTOLAND` is enabled, this also interacts with autoland approach settings based on waypoint index and flags.
message MSP_SET_WP_Request {

  // Index of the waypoint to set (0 to `NAV_MAX_WAYPOINTS - 1`)
  // Units: Index
  uint32 waypoint_index = 1;

  // Enum `navWaypointActions_e` Waypoint action type
  // Units: Enum
  navWaypointActions_e action = 2;

  // Latitude coordinate
  // Units: deg * 1e7
  int32 latitude = 3;

  // Longitude coordinate
  // Units: deg * 1e7
  int32 longitude = 4;

  // Altitude coordinate
  // Units: cm
  int32 altitude = 5;

  // Parameter 1
  // Units: Varies
  uint32 param1 = 6;

  // Parameter 2
  // Units: Varies
  uint32 param2 = 7;

  // Parameter 3
  // Units: Varies
  uint32 param3 = 8;

  // Bitmask: Waypoint flags (`navWaypointFlags_e`)
  // Units: Bitmask
  // Bitmask field.
  navWaypointFlags_e flag = 9;

}

// MSP message `MSP_SELECT_SETTING` request payload.
// MSP code: 210.
// MSP version: 1.
// Description: Selects the active configuration profile and saves it.
// Notes: Will fail if armed. Calls `setConfigProfileAndWriteEEPROM()`.
message MSP_SELECT_SETTING_Request {

  // Index of the profile to activate (0-based)
  uint32 profile_index = 1;

}

// MSP message `MSP_SET_HEAD` request payload.
// MSP code: 211.
// MSP version: 1.
// Description: Sets the target heading for the heading hold controller (e.g., during MAG mode).
// Notes: Expects 2 bytes. Calls `updateHeadingHoldTarget()`. Also synchronizes navigation yaw targets (including cruise/course) when NAV is controlling yaw.
message MSP_SET_HEAD_Request {

  // Target heading (0-359)
  // Units: degrees
  uint32 heading = 1;

}

// MSP message `MSP_SET_SERVO_CONFIGURATION` request payload.
// MSP code: 212.
// MSP version: 1.
// Description: Sets the configuration for a single servo (legacy format).
// Notes: Expects 15 bytes. Returns error if index is invalid. Calls `servoComputeScalingFactors()`. Superseded by `MSP2_INAV_SET_SERVO_CONFIG`.
message MSP_SET_SERVO_CONFIGURATION_Request {

  // Index of the servo to configure (0 to `MAX_SUPPORTED_SERVOS - 1`)
  // Units: Index
  uint32 servo_index = 1;

  // Minimum servo endpoint
  // Units: PWM
  uint32 min = 2;

  // Maximum servo endpoint
  // Units: PWM
  uint32 max_field = 3;

  // Middle/Neutral servo position
  // Units: PWM
  uint32 middle = 4;

  // Servo rate/scaling
  // Units: %
  uint32 rate = 5;

  // Ignored
  uint32 reserved1 = 6;

  // Ignored
  uint32 reserved2 = 7;

  // Ignored
  uint32 legacy_forward_chan = 8;

  // Ignored
  uint32 legacy_reversed_sources = 9;

}

// MSP message `MSP_SET_MOTOR` request payload.
// MSP code: 214.
// MSP version: 1.
// Description: Sets the disarmed motor values, typically used for motor testing or propeller balancing functions in a configurator.
// Notes: Expects 16 bytes. Modifies the `motor_disarmed` array. These values are *not* saved persistently.
message MSP_SET_MOTOR_Request {

  // Array of motor values to set when disarmed. Only affects first `MAX_SUPPORTED_MOTORS` entries
  // Units: PWM
  // MSP fixed length: 8.
  repeated uint32 motor_values = 1;

}

// MSP message `MSP_SET_3D` request payload.
// MSP code: 217.
// MSP version: 1.
// Description: Sets parameters related to 3D/reversible motor operation.
// Notes: Expects 6 bytes. Requires reversible motor support.
message MSP_SET_3D_Request {

  // Sets `reversibleMotorsConfigMutable()->deadband_low`
  // Units: PWM
  uint32 deadband_low = 1;

  // Sets `reversibleMotorsConfigMutable()->deadband_high`
  // Units: PWM
  uint32 deadband_high = 2;

  // Sets `reversibleMotorsConfigMutable()->neutral`
  // Units: PWM
  uint32 neutral = 3;

}

// MSP message `MSP_SET_RC_DEADBAND` request payload.
// MSP code: 218.
// MSP version: 1.
// Description: Sets RC input deadband values.
// Notes: Expects 5 bytes.
message MSP_SET_RC_DEADBAND_Request {

  // Sets `rcControlsConfigMutable()->deadband`
  // Units: PWM
  uint32 deadband = 1;

  // Sets `rcControlsConfigMutable()->yaw_deadband`
  // Units: PWM
  uint32 yaw_deadband = 2;

  // Sets `rcControlsConfigMutable()->alt_hold_deadband`
  // Units: PWM
  uint32 alt_hold_deadband = 3;

  // Sets `rcControlsConfigMutable()->mid_throttle_deadband`
  // Units: PWM
  uint32 throttle_deadband = 4;

}

// MSP message `MSP_SET_SENSOR_ALIGNMENT` request payload.
// MSP code: 220.
// MSP version: 1.
// Description: Sets sensor alignment (legacy format).
// Notes: Expects 4 bytes. Use `MSP_SET_BOARD_ALIGNMENT` for primary board orientation.
message MSP_SET_SENSOR_ALIGNMENT_Request {

  // Ignored
  uint32 gyro_align = 1;

  // Ignored
  uint32 acc_align = 2;

  // Sets `compassConfigMutable()->mag_align` (if `USE_MAG`)
  uint32 mag_align = 3;

  // Sets `opticalFlowConfigMutable()->opflow_align` (if `USE_OPFLOW`)
  uint32 opflow_align = 4;

}

// MSP message `MSP_SET_LED_STRIP_MODECOLOR` request payload.
// MSP code: 221.
// MSP version: 1.
// Description: Sets the color index for a specific LED mode/function combination.
// Notes: Only available if `USE_LED_STRIP` is defined. Expects 3 bytes. Returns error if setting fails (invalid index).
message MSP_SET_LED_STRIP_MODECOLOR_Request {

  // Index of the LED mode (`ledModeIndex_e` or `LED_MODE_COUNT` for special)
  uint32 mode_index = 1;

  // Index of the direction (`ledDirectionId_e`) or special color (`ledSpecialColorIds_e`)
  uint32 direction_or_special_index = 2;

  // Index of the color to assign from `ledStripConfig()->colors`
  uint32 color_index = 3;

}

// MSP message `MSP_SERVO_MIX_RULES` reply payload.
// MSP code: 241.
// MSP version: 1.
// Description: Retrieves the custom servo mixer rules (legacy format).
// Notes: Superseded by `MSP2_INAV_SERVO_MIXER`.
// Variable length: MAX_SERVO_RULES.
message MSP_SERVO_MIX_RULES_Reply {

  // Servo output channel index (0-based)
  // Units: Index
  uint32 target_channel = 1;

  // Enum `inputSource_e` Input source for the mix (RC chan, Roll, Pitch...)
  // Units: Enum
  inputSource_e input_source = 2;

  // Mixing rate/weight (`-1000` to `+1000`, percent with sign)
  // Units: %
  int32 rate = 3;

  // Speed/Slew rate limit (`0`=instant, higher slows response)
  // Units: 0-255
  uint32 speed = 4;

  // Always 0
  // Fixed value in MSP payload: 0.
  uint32 reserved1 = 5;

  // Always 100 (Legacy)
  // Fixed value in MSP payload: 100.
  uint32 legacy_max = 6;

  // Always 0 (Legacy)
  // Fixed value in MSP payload: 0.
  uint32 legacy_box = 7;

}

// MSP message `MSP_SET_SERVO_MIX_RULE` request payload.
// MSP code: 242.
// MSP version: 1.
// Description: Sets a single custom servo mixer rule (legacy format).
// Notes: Expects 9 bytes. Returns error if index invalid. Calls `loadCustomServoMixer()`. Superseded by `MSP2_INAV_SET_SERVO_MIXER`.
message MSP_SET_SERVO_MIX_RULE_Request {

  // Index of the rule to set (0 to `MAX_SERVO_RULES - 1`)
  // Units: Index
  uint32 rule_index = 1;

  // Servo output channel index
  // Units: Index
  uint32 target_channel = 2;

  // Enum `inputSource_e` Input source for the mix
  // Units: Enum
  inputSource_e input_source = 3;

  // Mixing rate/weight (`-1000` to `+1000`, percent with sign)
  // Units: %
  int32 rate = 4;

  // Speed/Slew rate limit (`0`=instant, higher slows response)
  // Units: 0-255
  uint32 speed = 5;

  // Ignored
  uint32 legacy_min_max = 6;

  // Ignored
  uint32 legacy_box = 7;

}

// MSP message `MSP_SET_PASSTHROUGH` reply payload.
// MSP code: 245.
// MSP version: 1.
// Description: Enables serial passthrough mode to peripherals like ESCs (BLHeli 4-way) or other serial devices.
// Notes: Accepts 0 bytes (defaults to ESC 4-way) or up to 2 bytes for mode/argument. If successful, sets `mspPostProcessFn` to the appropriate handler (`mspSerialPassthroughFn` or `esc4wayProcess`). This handler takes over the serial port after the reply is sent. Requires `USE_SERIAL_4WAY_BLHELI_INTERFACE` for ESC passthrough.
message MSP_SET_PASSTHROUGH_Reply {

  // 1 if passthrough started successfully, 0 on error (e.g., port not found). For 4way, returns number of ESCs found
  uint32 status = 1;

}

// MSP message `MSP_RTC` reply payload.
// MSP code: 246.
// MSP version: 1.
// Description: Retrieves the current Real-Time Clock time.
// Notes: Requires RTC hardware/support. Returns (0, 0) if time is not available/set.
message MSP_RTC_Reply {

  // Seconds since epoch (or relative time if not set). 0 if RTC time unknown
  // Units: Seconds
  int32 seconds = 1;

  // Millisecond part of the time. 0 if RTC time unknown
  // Units: Milliseconds
  uint32 millis = 2;

}

// MSP message `MSP_SET_RTC` request payload.
// MSP code: 247.
// MSP version: 1.
// Description: Sets the Real-Time Clock time.
// Notes: Requires RTC hardware/support. Expects 6 bytes. Uses `rtcSet()`.
message MSP_SET_RTC_Request {

  // Seconds component of time to set
  // Units: Seconds
  int32 seconds = 1;

  // Millisecond component of time to set
  // Units: Milliseconds
  uint32 millis = 2;

}

// MSP message `MSP_DEBUGMSG` reply payload.
// MSP code: 253.
// MSP version: 1.
// Description: Retrieves debug ("serial printf") messages from the firmware.
// Notes: Published via the LOG UART or shared MSP/LOG port using `mspSerialPushPort()`.
// Variable length: True.
message MSP_DEBUGMSG_Reply {

  // Debug message text (not NUL-terminated). See [serial printf debugging](https://github.com/iNavFlight/inav/blob/master/docs/development/serial_printf_debugging.md)
  // MSP variable-length array.
  string message_text = 1;

}

// MSP message `MSP_DEBUG` reply payload.
// MSP code: 254.
// MSP version: 1.
// Description: Retrieves values from the firmware's `debug[]` array (legacy 16-bit version).
// Notes: Useful for developers. Values are truncated to the lower 16 bits of each `debug[]` entry. See `MSP2_INAV_DEBUG` for full 32-bit values.
message MSP_DEBUG_Reply {

  // First 4 values from the `debug` array
  // MSP fixed length: 4.
  repeated uint32 debug_values = 1;

}

// MSP message `MSP2_COMMON_TZ` reply payload.
// MSP code: 4097.
// MSP version: 2.
// Description: Gets the time zone offset configuration.
message MSP2_COMMON_TZ_Reply {

  // Time zone offset from UTC (`timeConfig()->tz_offset`)
  // Units: Minutes
  int32 tz_offset_minutes = 1;

  // Automatic daylight saving time enabled (`timeConfig()->tz_automatic_dst`)
  // Units: Boolean
  uint32 tz_auto_dst = 2;

}

// MSP message `MSP2_COMMON_SET_TZ` request payload.
// MSP code: 4098.
// MSP version: 2.
// Description: Sets the time zone offset configuration.
// Notes: Accepts 2 or 3 bytes.
// 2 schema variants selected by MSP payload shape.
message MSP2_COMMON_SET_TZ_Request {

  // Variant condition: dataSize == 2
  message Variant1 {

    // Timezone offset from UTC.
    // Units: minutes
    int32 tz_offset = 1;

  }

  // Variant condition: dataSize == 3
  message Variant2 {

    // Timezone offset from UTC.
    // Units: minutes
    int32 tz_offset = 1;

    // Automatic DST enable (0/1).
    // Units: bool
    uint32 tz_automatic_dst = 2;

  }

  oneof variant {
    // dataSize == 2
    Variant1 variant_1 = 1;
    // dataSize == 3
    Variant2 variant_2 = 2;
  }
}

// MSP message `MSP2_COMMON_SETTING` request payload.
// MSP code: 4099.
// MSP version: 2.
// Description: Gets the value of a specific configuration setting, identified by name or index.
// Notes: Returns error if setting not found. Use `MSP2_COMMON_SETTING_INFO` to discover settings, types, and sizes.
// Variable length: True.
message MSP2_COMMON_SETTING_Request {

  // Setting name (null-terminated string) OR index selector (`0x00` followed by `uint16_t` index)
  // Polymorphic MSP field emitted as bytes.
  bytes setting_identifier = 1;

}

// MSP message `MSP2_COMMON_SETTING` reply payload.
// MSP code: 4099.
// MSP version: 2.
// Description: Gets the value of a specific configuration setting, identified by name or index.
// Notes: Returns error if setting not found. Use `MSP2_COMMON_SETTING_INFO` to discover settings, types, and sizes.
// Variable length: True.
message MSP2_COMMON_SETTING_Reply {

  // Raw byte value of the setting. Size depends on the setting's type (`settingGetValueSize()`)
  // MSP variable-length array.
  bytes setting_value = 1;

}

// MSP message `MSP2_COMMON_SET_SETTING` request payload.
// MSP code: 4100.
// MSP version: 2.
// Description: Sets the value of a specific configuration setting, identified by name or index.
// Notes: Performs type checking and range validation (min/max). Returns error if setting not found, value size mismatch, or value out of range. Handles different data types (`uint8`, `int16`, `float`, `string`, etc.) internally.
// Variable length: True.
message MSP2_COMMON_SET_SETTING_Request {

  // Setting name (null-terminated string) OR Index (0x00 followed by `uint16_t` index)
  // Polymorphic MSP field emitted as bytes.
  bytes setting_identifier = 1;

  // Raw byte value to set for the setting. Size must match the setting's type
  // MSP variable-length array.
  bytes setting_value = 2;

}

// MSP message `MSP2_COMMON_MOTOR_MIXER` reply payload.
// MSP code: 4101.
// MSP version: 2.
// Description: Retrieves the current motor mixer configuration (throttle, roll, pitch, yaw weights) for each motor.
// Notes: Scaling is `(float_weight + 2.0) * 1000`. `primaryMotorMixer()` provides the data. If multiple mixer profiles are enabled (`MAX_MIXER_PROFILE_COUNT > 1`), an additional block of mixes for the next profile follows immediately.
// Variable length: MAX_SUPPORTED_MOTORS.
message MSP2_COMMON_MOTOR_MIXER_Reply {

  // Weights for a single motor `[throttle, roll, pitch, yaw]`, each encoded as `(mix + 2.0) * 1000` (range 0-4000)
  // Units: Scaled (0-4000)
  // MSP fixed length: 4.
  repeated uint32 motor_mix = 1;

}

// MSP message `MSP2_COMMON_SET_MOTOR_MIXER` request payload.
// MSP code: 4102.
// MSP version: 2.
// Description: Sets the motor mixer weights for a single motor in the primary mixer profile.
// Notes: Expects 9 bytes. Modifies `primaryMotorMixerMutable()`. Returns error if index is invalid.
message MSP2_COMMON_SET_MOTOR_MIXER_Request {

  // Index of the motor to configure (0 to `MAX_SUPPORTED_MOTORS - 1`)
  // Units: Index
  uint32 motor_index = 1;

  // Sets throttle weight from `(value / 1000.0) - 2.0
  // Units: Scaled (0-4000)
  uint32 throttle_weight = 2;

  // Sets roll weight from `(value / 1000.0) - 2.0
  // Units: Scaled (0-4000)
  uint32 roll_weight = 3;

  // Sets pitch weight from `(value / 1000.0) - 2.0
  // Units: Scaled (0-4000)
  uint32 pitch_weight = 4;

  // Sets yaw weight from `(value / 1000.0) - 2.0
  // Units: Scaled (0-4000)
  uint32 yaw_weight = 5;

}

// MSP message `MSP2_COMMON_SETTING_INFO` reply payload.
// MSP code: 4103.
// MSP version: 2.
// Description: Gets detailed information about a specific configuration setting (name, type, range, flags, current value, etc.).
// Variable length: True.
message MSP2_COMMON_SETTING_INFO_Reply {

  // Null-terminated setting name
  // MSP variable-length array.
  string setting_name = 1;

  // Parameter Group Number (PGN) ID
  uint32 pgn = 2;

  // Variable type (`VAR_UINT8`, `VAR_FLOAT`, etc.)
  uint32 type = 3;

  // Setting section (`MASTER_VALUE`, `PROFILE_VALUE`, etc.)
  uint32 section = 4;

  // Setting mode (`MODE_NORMAL`, `MODE_LOOKUP`, etc.)
  uint32 mode = 5;

  // Minimum allowed value (as signed 32-bit)
  int32 min_value = 6;

  // Maximum allowed value (as unsigned 32-bit)
  uint32 max_value = 7;

  // Absolute index of the setting
  uint32 setting_index = 8;

  // Current profile index (if applicable, else 0)
  uint32 profile_index = 9;

  // Total number of profiles (if applicable, else 0)
  uint32 profile_count = 10;

  // (If `mode == MODE_LOOKUP`) Series of null-terminated strings for each possible value from min to max
  // MSP variable-length array.
  string lookup_names = 11;

  // Current raw byte value of the setting
  // MSP variable-length array.
  bytes setting_value = 12;

}

// MSP message `MSP2_COMMON_PG_LIST` request payload.
// MSP code: 4104.
// MSP version: 2.
// Description: Gets a list of Parameter Group Numbers (PGNs) used by settings, along with the start and end setting indexes for each group. Can request info for a single PGN.
// Notes: Allows efficient fetching of related settings by group.
// Variable length: for each PGN found.
message MSP2_COMMON_PG_LIST_Request {

  // (Optional) PGN ID to query. If omitted, returns all used PGNs
  // Optional field in the MSP payload.
  uint32 pgn = 1;

}

// MSP message `MSP2_COMMON_PG_LIST` reply payload.
// MSP code: 4104.
// MSP version: 2.
// Description: Gets a list of Parameter Group Numbers (PGNs) used by settings, along with the start and end setting indexes for each group. Can request info for a single PGN.
// Notes: Allows efficient fetching of related settings by group.
// Variable length: for each PGN found.
message MSP2_COMMON_PG_LIST_Reply {

  // Parameter Group Number (PGN) ID
  uint32 pgn = 1;

  // Absolute index of the first setting in this group
  uint32 start_index = 2;

  // Absolute index of the last setting in this group
  uint32 end_index = 3;

}

// MSP message `MSP2_COMMON_SERIAL_CONFIG` reply payload.
// MSP code: 4105.
// MSP version: 2.
// Description: Retrieves the configuration for all available serial ports.
// Notes: Baud rate indexes map to actual baud rates (e.g., 9600, 115200). See `baudRates` array.
// Variable length: for each available serial port.
message MSP2_COMMON_SERIAL_CONFIG_Reply {

  // Port identifier Enum (`serialPortIdentifier_e`)
  serialPortIdentifier_e identifier = 1;

  // Bitmask: enabled functions (`FUNCTION_*`)
  // Units: Bitmask
  // Bitmask field.
  uint32 function_mask = 2;

  // Baud rate index for MSP function
  uint32 msp_baud_index = 3;

  // Baud rate index for GPS function
  uint32 gps_baud_index = 4;

  // Baud rate index for Telemetry function
  uint32 telemetry_baud_index = 5;

  // Baud rate index for other peripheral functions
  uint32 peripheral_baud_index = 6;

}

// MSP message `MSP2_COMMON_SET_SERIAL_CONFIG` request payload.
// MSP code: 4106.
// MSP version: 2.
// Description: Sets the configuration for one or more serial ports.
// Notes: Payload size must be a multiple of the size of one port config entry (1 + 4 + 4 = 9 bytes). Returns error if identifier is invalid or size is incorrect. Baud rate indexes are constrained `BAUD_MIN` to `BAUD_MAX`.
// Variable length: for each port being configured.
message MSP2_COMMON_SET_SERIAL_CONFIG_Request {

  // Port identifier Enum (`serialPortIdentifier_e`)
  serialPortIdentifier_e identifier = 1;

  // Bitmask: functions to enable
  // Units: Bitmask
  // Bitmask field.
  uint32 function_mask = 2;

  // Baud rate index for MSP
  uint32 msp_baud_index = 3;

  // Baud rate index for GPS
  uint32 gps_baud_index = 4;

  // Baud rate index for Telemetry
  uint32 telemetry_baud_index = 5;

  // Baud rate index for peripherals
  uint32 peripheral_baud_index = 6;

}

// MSP message `MSP2_COMMON_SET_RADAR_POS` request payload.
// MSP code: 4107.
// MSP version: 2.
// Description: Sets the position and status information for a "radar" Point of Interest (POI). Used for displaying other craft/objects on the OSD map.
// Notes: Expects 19 bytes. POI index is clamped to `RADAR_MAX_POIS - 1`. Updates the `radar_pois` array.
message MSP2_COMMON_SET_RADAR_POS_Request {

  // Index of the POI slot (0 to `RADAR_MAX_POIS - 1`)
  // Units: Index
  uint32 poi_index = 1;

  // Status of the POI (0=undefined, 1=armed, 2=lost)
  uint32 state = 2;

  // Latitude of the POI
  // Units: deg * 1e7
  int32 latitude = 3;

  // Longitude of the POI
  // Units: deg * 1e7
  int32 longitude = 4;

  // Altitude of the POI
  // Units: cm
  int32 altitude = 5;

  // Heading of the POI
  // Units: degrees
  uint32 heading = 6;

  // Speed of the POI
  // Units: cm/s
  uint32 speed = 7;

  // Link quality indicator
  // Units: 0-4
  uint32 link_quality = 8;

}

// MSP message `MSP2_COMMON_SET_MSP_RC_LINK_STATS` request payload.
// MSP code: 4109.
// MSP version: 2.
// Description: Provides RC link statistics (RSSI, LQ) to the FC, typically from an MSP-based RC link (like ExpressLRS). Sent periodically by the RC link.
// Notes: Requires `USE_RX_MSP`. Expects at least 7 bytes. Updates `rxLinkStatistics` and sets RSSI via `setRSSIFromMSP_RC()` only if `sublinkID` is 0. This message expects **no reply** (`MSP_RESULT_NO_REPLY`).
message MSP2_COMMON_SET_MSP_RC_LINK_STATS_Request {

  // Sublink identifier (usually 0)
  uint32 sublink_id = 1;

  // Indicates if the link is currently valid (not in failsafe)
  // Units: Boolean
  uint32 valid_link = 2;

  // Uplink RSSI percentage (0-100)
  // Units: %
  uint32 rssi_percent = 3;

  // Uplink RSSI in dBm (sent as positive, e.g., 70 means -70dBm)
  // Units: -dBm
  uint32 uplink_rssi_d_bm = 4;

  // Downlink Link Quality (0-100)
  // Units: %
  uint32 downlink_lq = 5;

  // Uplink Link Quality (0-100)
  // Units: %
  uint32 uplink_lq = 6;

  // Uplink Signal-to-Noise Ratio
  // Units: dB
  int32 uplink_snr = 7;

}

// MSP message `MSP2_COMMON_SET_MSP_RC_INFO` request payload.
// MSP code: 4110.
// MSP version: 2.
// Description: Provides additional RC link information (power levels, band, mode) to the FC from an MSP-based RC link. Sent less frequently than link stats.
// Notes: Requires `USE_RX_MSP`. Expects at least 15 bytes. Updates `rxLinkStatistics` only if `sublinkID` is 0. Converts band/mode strings to uppercase. This message expects **no reply** (`MSP_RESULT_NO_REPLY`).
message MSP2_COMMON_SET_MSP_RC_INFO_Request {

  // Sublink identifier (usually 0)
  uint32 sublink_id = 1;

  // Uplink transmitter power level
  // Units: mW
  uint32 uplink_tx_power = 2;

  // Downlink transmitter power level
  // Units: mW
  uint32 downlink_tx_power = 3;

  // Operating band string (e.g., "2G4", "900"), null-terminated/padded
  // MSP fixed length: 4.
  string band = 4;

  // Operating mode/rate string (e.g., "100HZ", "F1000"), null-terminated/padded
  // MSP fixed length: 6.
  string mode = 5;

}

// MSP message `MSP2_COMMON_GET_RADAR_GPS` reply payload.
// MSP code: 4111.
// MSP version: 2.
// Description: Provides the GPS positions (latitude, longitude, altitude) for each radar point of interest.
// Notes: Returns the stored GPS coordinates for all radar POIs (`radar_pois[i].gps`).
message MSP2_COMMON_GET_RADAR_GPS_Reply {

  // Latitude of a radar POI
  // Units: deg * 1e7
  int32 poi_latitude = 1;

  // Longitude of a radar POI
  // Units: deg * 1e7
  int32 poi_longitude = 2;

  // Altitude of a radar POI
  // Units: cm
  int32 poi_altitude = 3;

}

// MSP message `MSP2_SENSOR_RANGEFINDER` request payload.
// MSP code: 7937.
// MSP version: 2.
// Description: Provides rangefinder data (distance, quality) from an external MSP-based sensor.
// Notes: Requires `USE_RANGEFINDER_MSP`. Calls `mspRangefinderReceiveNewData()`.
message MSP2_SENSOR_RANGEFINDER_Request {

  // Quality of the measurement
  // Units: 0-255
  uint32 quality = 1;

  // Measured distance. Negative value indicates out of range
  // Units: mm
  int32 distance_mm = 2;

}

// MSP message `MSP2_SENSOR_OPTIC_FLOW` request payload.
// MSP code: 7938.
// MSP version: 2.
// Description: Provides optical flow data (motion, quality) from an external MSP-based sensor.
// Notes: Requires `USE_OPFLOW_MSP`. Calls `mspOpflowReceiveNewData()`.
message MSP2_SENSOR_OPTIC_FLOW_Request {

  // Quality of the measurement (0-255)
  uint32 quality = 1;

  // Raw integrated flow value X
  int32 motion_x = 2;

  // Raw integrated flow value Y
  int32 motion_y = 3;

}

// MSP message `MSP2_SENSOR_GPS` request payload.
// MSP code: 7939.
// MSP version: 2.
// Description: Provides detailed GPS data from an external MSP-based GPS module.
// Notes: Requires `USE_GPS_PROTO_MSP`. Calls `mspGPSReceiveNewData()`.
message MSP2_SENSOR_GPS_Request {

  // Sensor instance number (for multi-GPS)
  uint32 instance = 1;

  // GPS week number (0xFFFF if unavailable)
  uint32 gps_week = 2;

  // Milliseconds Time of Week
  // Units: ms
  uint32 ms_tow = 3;

  // Enum `gpsFixType_e` Type of GPS fix
  // Units: Enum
  gpsFixType_e fix_type = 4;

  // Number of satellites used in solution
  // Units: Count
  uint32 satellites_in_view = 5;

  // Horizontal position accuracy estimate in milimeters
  // Units: mm
  uint32 h_pos_accuracy = 6;

  // Vertical position accuracy estimate in milimeters
  // Units: mm
  uint32 v_pos_accuracy = 7;

  // Horizontal velocity accuracy estimate
  // Units: cm/s
  uint32 h_vel_accuracy = 8;

  // Horizontal Dilution of Precision
  // Units: HDOP * 100
  uint32 hdop = 9;

  // Longitude
  // Units: deg * 1e7
  int32 longitude = 10;

  // Latitude
  // Units: deg * 1e7
  int32 latitude = 11;

  // Altitude above Mean Sea Level
  // Units: cm
  int32 msl_altitude = 12;

  // North velocity (NED frame)
  // Units: cm/s
  int32 ned_vel_north = 13;

  // East velocity (NED frame)
  // Units: cm/s
  int32 ned_vel_east = 14;

  // Down velocity (NED frame)
  // Units: cm/s
  int32 ned_vel_down = 15;

  // Ground course (0-36000)
  // Units: deg * 100
  uint32 ground_course = 16;

  // True heading/yaw (0-36000, 65535 if unavailable)
  // Units: deg * 100
  uint32 true_yaw = 17;

  // Year (e.g., 2023)
  uint32 year = 18;

  // Month (1-12)
  uint32 month = 19;

  // Day of month (1-31)
  uint32 day = 20;

  // Hour (0-23)
  uint32 hour = 21;

  // Minute (0-59)
  uint32 min = 22;

  // Second (0-59)
  uint32 sec = 23;

}

// MSP message `MSP2_SENSOR_COMPASS` request payload.
