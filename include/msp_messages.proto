// MSP message `MSP_MODE_RANGES` reply payload.
// MSP code: 34.
// MSP version: 1.
// Description: Returns all defined mode activation ranges (aux channel assignments for flight modes).
// Notes: The number of steps and mapping to PWM values depends on internal range calculations.
message MSP_MODE_RANGES_Reply {

  // Permanent ID of the flight mode (maps to `boxId` via `findBoxByActiveBoxId`). 0 if entry unused
  // Units: ID
  uint32 mode_permanent_id = 1;

  // 0-based index of the AUX channel used for activation
  // Units: Index
  uint32 aux_channel_index = 2;

  // Start step (0-48). Each step is 25 PWM units; 0 is <=900 and 48 is >=2100.
  // Units: step
  uint32 range_start_step = 3;

  // End step (0-48). Uses the same 25-PWM step mapping as rangeStartStep.
  // Units: step
  uint32 range_end_step = 4;

}

// MSP message `MSP_SET_MODE_RANGE` request payload.
// MSP code: 35.
// MSP version: 1.
// Description: Sets a single mode activation range by its index.
// Notes: Expects 5 bytes. Updates the mode configuration and recalculates used mode flags. Returns error if `rangeIndex` or `modePermanentId` is invalid.
message MSP_SET_MODE_RANGE_Request {

  // Index of the mode range to set (0 to `MAX_MODE_ACTIVATION_CONDITION_COUNT - 1`)
  // Units: Index
  uint32 range_index = 1;

  // Permanent ID of the flight mode to assign
  // Units: ID
  uint32 mode_permanent_id = 2;

  // 0-based index of the AUX channel
  // Units: Index
  uint32 aux_channel_index = 3;

  // Start step (0-48). Each step is 25 PWM units; 0 is <=900 and 48 is >=2100.
  // Units: step
  uint32 range_start_step = 4;

  // End step (0-48). Uses the same 25-PWM step mapping as rangeStartStep.
  // Units: step
  uint32 range_end_step = 5;

}

