// MSP message `MSP_ADJUSTMENT_RANGES` reply payload.
// MSP code: 52.
// MSP version: 1.
// Description: Returns all defined RC adjustment ranges (tuning via aux channels).
// Notes: See `adjustmentRange_t`.
message MSP_ADJUSTMENT_RANGES_Reply {

  // Index of the adjustment slot (0 to `MAX_SIMULTANEOUS_ADJUSTMENT_COUNT - 1`)
  uint32 adjustment_index = 1;

  // 0-based index of the AUX channel controlling the adjustment value
  uint32 aux_channel_index = 2;

  // Start step (0-48). Each step is 25 PWM units; 0 is <=900 and 48 is >=2100.
  // Units: step
  uint32 range_start_step = 3;

  // End step (0-48). Uses the same 25-PWM step mapping as rangeStartStep.
  // Units: step
  uint32 range_end_step = 4;

  // Function/parameter being adjusted (see `adjustmentFunction_e`).
  adjustmentFunction_e adjustment_function = 5;

  // 0-based index of the AUX channel acting as an enable switch (or 0 if always enabled)
  uint32 aux_switch_channel_index = 6;

}

// MSP message `MSP_SET_ADJUSTMENT_RANGE` request payload.
// MSP code: 53.
// MSP version: 1.
// Description: Sets a single RC adjustment range configuration by its index.
// Notes: Expects 7 bytes. Returns error if `rangeIndex` or `adjustmentIndex` is invalid.
message MSP_SET_ADJUSTMENT_RANGE_Request {

  // Index of the adjustment range to set (0 to `MAX_ADJUSTMENT_RANGE_COUNT - 1`)
  uint32 range_index = 1;

  // Adjustment slot index (0 to `MAX_SIMULTANEOUS_ADJUSTMENT_COUNT - 1`)
  uint32 adjustment_index = 2;

  // 0-based index of the control AUX channel
  uint32 aux_channel_index = 3;

  // Start step (0-48). Each step is 25 PWM units; 0 is <=900 and 48 is >=2100.
  // Units: step
  uint32 range_start_step = 4;

  // End step (0-48). Uses the same 25-PWM step mapping as rangeStartStep.
  // Units: step
  uint32 range_end_step = 5;

  // Function/parameter being adjusted.
  adjustmentFunction_e adjustment_function = 6;

  // 0-based index of the enable switch AUX channel (or 0)
  uint32 aux_switch_channel_index = 7;

}

