  // Units: Enum
  motorPwmProtocolTypes_e motor_pwm_protocol = 4;

  // Motor PWM rate (if applicable) (`motorConfig()->motorPwmRate`).
  // Units: Hz
  uint32 motor_pwm_rate = 5;

  // Servo PWM rate (`servoConfig()->servoPwmRate`).
  // Units: Hz
