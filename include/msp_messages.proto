  // Max climb rate in autonomous modes (uses `fw.max_auto_climb_rate` or `mc.max_auto_climb_rate` based on platform)
  // Units: cm/s
  uint32 max_auto_climb_rate = 3;

  // Max speed in manual modes with GPS aiding (`navConfig()->general.max_manual_speed`)
  // Units: cm/s
  uint32 max_manual_speed = 4;

  // Max climb rate in manual modes with GPS aiding (uses `fw.max_manual_climb_rate` or `mc.max_manual_climb_rate`)
  // Units: cm/s
  uint32 max_manual_climb_rate = 5;

  // Max bank angle for multirotor position hold (`navConfig()->mc.max_bank_angle`)
  // Units: degrees
  uint32 mc_max_bank_angle = 6;

  // Enum `navMcAltHoldThrottle_e` mirrored from `navConfig()->mc.althold_throttle_type`.
  // Units: Enum
