// Variable length: True.
message MSP2_SENSOR_HEADTRACKER_Request {

  // Units: Head tracker angles (e.g., int16 Roll, Pitch, Yaw in deci-degrees)
  // Polymorphic MSP field emitted as bytes.
  bytes field_1 = 1;

}

// MSP message `MSP2_INAV_STATUS` reply payload.
// MSP code: 8192.
// MSP version: 2.
// Description: Provides comprehensive flight controller status, extending `MSP_STATUS_EX` with full arming flags, battery profile, and mixer profile.
// Notes: `sensorStatus` bits follow `packSensorStatus()` (bit 15 indicates hardware failure). `profileAndBattProfile` packs the current config profile in the low nibble and the battery profile in the high nibble. `activeModes` is emitted as a little-endian array of 32-bit words sized to `CHECKBOX_ITEM_COUNT`.
message MSP2_INAV_STATUS_Reply {

  // Main loop cycle time
  // Units: µs
  uint32 cycle_time = 1;

  // I2C errors
  // Units: Count
  uint32 i2c_errors = 2;

  // Bitmask: Sensor status
  // Units: Bitmask
  // Bitmask field.
  uint32 sensor_status = 3;

  // Average system load percentage
  // Units: %
  uint32 cpu_load = 4;

  // Bits 0-3: Config profile index (`getConfigProfile()`), Bits 4-7: Battery profile index (`getConfigBatteryProfile()`)
  // Units: Packed
  uint32 profile_and_batt_profile = 5;

  // Bitmask: Full 32-bit flight controller arming flags (`armingFlags`)
  // Units: Bitmask
  // Bitmask field.
  uint32 arming_flags = 6;

  // Bitmask words for active flight modes (`packBoxModeFlags()`)
  // Units: Bitmask
  // Bitmask field.
  // Opaque MSP type `boxBitmask_t` emitted as bytes.
  bytes active_modes = 7;

  // Current mixer profile index (`getConfigMixerProfile()`)
  // Units: Index
  uint32 mixer_profile = 8;

}

// MSP message `MSP2_INAV_OPTICAL_FLOW` reply payload.
// MSP code: 8193.
// MSP version: 2.
// Description: Provides data from the optical flow sensor.
// Notes: Requires `USE_OPFLOW`.
message MSP2_INAV_OPTICAL_FLOW_Reply {

  // Raw quality indicator from the sensor (`opflow.rawQuality`). 0 if `USE_OPFLOW` disabled
  // Units: 0-255
  uint32 quality = 1;

  // Optical flow rate X (roll axis) (`RADIANS_TO_DEGREES(opflow.flowRate[X])`). 0 if `USE_OPFLOW` disabled
  // Units: degrees/s
  int32 flow_rate_x = 2;

  // Optical flow rate Y (pitch axis) (`RADIANS_TO_DEGREES(opflow.flowRate[Y])`). 0 if `USE_OPFLOW` disabled
  // Units: degrees/s
  int32 flow_rate_y = 3;

  // Compensated body rate X (roll axis) (`RADIANS_TO_DEGREES(opflow.bodyRate[X])`). 0 if `USE_OPFLOW` disabled
  // Units: degrees/s
  int32 body_rate_x = 4;

  // Compensated body rate Y (pitch axis) (`RADIANS_TO_DEGREES(opflow.bodyRate[Y])`). 0 if `USE_OPFLOW` disabled
  // Units: degrees/s
  int32 body_rate_y = 5;

}

// MSP message `MSP2_INAV_ANALOG` reply payload.
// MSP code: 8194.
// MSP version: 2.
// Description: Provides detailed analog sensor readings, superseding `MSP_ANALOG` with higher precision and additional fields.
// Notes: Requires `USE_CURRENT_METER`/`USE_ADC` for current-related fields; values fall back to zero when unavailable. Capacity fields are reported in the units configured by `batteryMetersConfig()->capacity_unit` (mAh or mWh).
message MSP2_INAV_ANALOG_Reply {

  // Bitmask: Bit0=Full on plug-in, Bit1=Use capacity thresholds, Bits2-3=`batteryState_e` (`getBatteryState()`), Bits4-7=Cell count (`getBatteryCellCount()`)
  // Units: Bitmask
  // Bitmask field.
  uint32 battery_flags = 1;

  // Battery voltage (`getBatteryVoltage()`)
  // Units: 0.01V
  uint32 vbat = 2;

  // Current draw (`getAmperage()`)
  // Units: 0.01A
  int32 amperage = 3;

  // Power draw (`getPower()`)
  // Units: 0.01W
  uint32 power_draw = 4;

  // Consumed capacity (`getMAhDrawn()`)
  // Units: mAh
  uint32 m_ah_drawn = 5;

  // Consumed energy (`getMWhDrawn()`)
  // Units: mWh
  uint32 m_wh_drawn = 6;

  // Estimated remaining capacity (`getBatteryRemainingCapacity()`)
  // Units: Capacity unit (`batteryMetersConfig()->capacity_unit`)
  uint32 remaining_capacity = 7;

  // Estimated remaining capacity percentage (`calculateBatteryPercentage()`)
  // Units: %
  uint32 percentage_remaining = 8;

  // RSSI value (`getRSSI()`)
  // Units: Raw (0-1023)
  uint32 rssi = 9;

}

// MSP message `MSP2_INAV_MISC` reply payload.
// MSP code: 8195.
