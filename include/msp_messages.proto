// MSP message `MSP_OSD_CONFIG` reply payload.
// MSP code: 84.
// MSP version: 1.
// Description: Retrieves OSD configuration settings and layout for screen 0. Coordinates are packed as `(Y << 8) | X`. When `USE_OSD` is not compiled in, only `osdDriverType` = `OSD_DRIVER_NONE` is returned.
// Notes: 1 byte if `USE_OSD` disabled; full payload (1 + fields + 2*OSD_ITEM_COUNT bytes) otherwise.
// Variable length: True.
message MSP_OSD_CONFIG_Reply {

  // Enum `osdDriver_e`: `OSD_DRIVER_MAX7456` if `USE_OSD`, else `OSD_DRIVER_NONE`.
  // Units: Enum
  osdDriver_e osd_driver_type = 1;

  // Enum `videoSystem_e`: Video system (Auto/PAL/NTSC) (`osdConfig()->video_system`). Sent even if OSD disabled
  // Units: Enum
  videoSystem_e video_system = 2;

  // Enum `osd_unit_e` Measurement units (Metric/Imperial) (`osdConfig()->units`). Sent even if OSD disabled
  // Units: Enum
  osd_unit_e units = 3;

  // RSSI alarm threshold (`osdConfig()->rssi_alarm`). Sent even if OSD disabled
  // Units: %
  uint32 rssi_alarm = 4;

  // Capacity alarm threshold (`currentBatteryProfile->capacity.warning`). Truncated to 16 bits. Sent even if OSD disabled.
  // Units: mAh/mWh
  uint32 cap_alarm = 5;

  // Timer alarm threshold in minutes (`osdConfig()->time_alarm`). Sent even if OSD disabled.
  // Units: minutes
  uint32 timer_alarm = 6;

  // Altitude alarm threshold (`osdConfig()->alt_alarm`). Sent even if OSD disabled
  // Units: meters
  uint32 alt_alarm = 7;

  // Distance alarm threshold (`osdConfig()->dist_alarm`). Sent even if OSD disabled
  // Units: meters
  uint32 dist_alarm = 8;

  // Negative altitude alarm threshold (`osdConfig()->neg_alt_alarm`). Sent even if OSD disabled
  // Units: meters
  uint32 neg_alt_alarm = 9;

  // Packed X/Y position for each OSD item on screen 0 (`osdLayoutsConfig()->item_pos[0][i]`). Sent even if OSD disabled
  // Units: packed
  // MSP fixed length: OSD_ITEM_COUNT.
  repeated uint32 item_positions = 10;

}

// MSP message `MSP_SET_OSD_CONFIG` request payload.
// MSP code: 85.
// MSP version: 1.
// Description: Sets OSD configuration or a single item's position on screen 0.
// Notes: Requires `USE_OSD`. Distinguishes formats based on the first byte. Format 1 requires at least 10 bytes. Format 2 requires 3 bytes. Triggers an OSD redraw. See `MSP2_INAV_OSD_SET_*` for more advanced control.
// 2 schema variants selected by MSP payload shape.
message MSP_SET_OSD_CONFIG_Request {

  // Variant condition: dataSize >= 10
  message Variant1 {

    // Must be 0xFF (-1) to indicate a configuration update.
    // Fixed value in MSP payload: 255.
    uint32 selector = 1;

    // Enum `videoSystem_e`: Video system (Auto/PAL/NTSC) (`osdConfig()->video_system`).
    // Units: Enum
    videoSystem_e video_system = 2;

    // Enum `osd_unit_e` Measurement units (Metric/Imperial) (`osdConfig()->units`).
    // Units: Enum
    osd_unit_e units = 3;

    // RSSI alarm threshold (`osdConfig()->rssi_alarm`).
    // Units: %
    uint32 rssi_alarm = 4;

    // Capacity alarm threshold (`currentBatteryProfile->capacity.warning`). Truncated to 16 bits.
    // Units: mAh/mWh
    uint32 cap_alarm = 5;

    // Timer alarm threshold in minutes (`osdConfig()->time_alarm`).
    // Units: minutes
    uint32 timer_alarm = 6;

    // Altitude alarm threshold (`osdConfig()->alt_alarm`).
    // Units: meters
    uint32 alt_alarm = 7;

    // Distance alarm threshold (`osdConfig()->dist_alarm`). Optional trailing field.
    // Units: meters
    // Optional field in the MSP payload.
    uint32 dist_alarm = 8;

    // Negative altitude alarm threshold (`osdConfig()->neg_alt_alarm`). Optional trailing field.
    // Units: meters
    // Optional field in the MSP payload.
    uint32 neg_alt_alarm = 9;

  }

  // Variant condition: dataSize == 3
  message Variant2 {

    // Index of the OSD item to update (0 to `OSD_ITEM_COUNT - 1`).
    // Units: Index
    uint32 item_index = 1;

    // Packed X/Y position (`(Y << 8) | X`) for the specified item.
    // Units: packed
    uint32 item_position = 2;

  }

  oneof variant {
    // dataSize >= 10
    Variant1 variant_1 = 1;
    // dataSize == 3
    Variant2 variant_2 = 2;
  }
}

// MSP message `MSP_OSD_CHAR_WRITE` request payload.
// MSP code: 87.
// MSP version: 1.
// Description: Writes character data to the OSD font memory.
// Notes: Requires `USE_OSD`. Minimum payload is `OSD_CHAR_VISIBLE_BYTES + 1` (8-bit address + 54 bytes). Payload size determines the address width and whether the extra metadata bytes are present. Writes characters via `displayWriteFontCharacter()`.
// Variable length: True.
// 4 schema variants selected by MSP payload shape.
message MSP_OSD_CHAR_WRITE_Request {

  // Variant condition: payloadSize >= OSD_CHAR_BYTES + 2 (>=66 bytes)
  message Variant1 {

    // Character slot index (0-1023).
    uint32 address = 1;

    // All 64 bytes, including driver metadata.
    // MSP fixed length: OSD_CHAR_BYTES.
    bytes char_data = 2;

  }

  // Variant condition: payloadSize == OSD_CHAR_BYTES + 1 (65 bytes)
  message Variant2 {

    // Character slot index (0-255).
    uint32 address = 1;

    // All 64 bytes, including driver metadata.
    // MSP fixed length: OSD_CHAR_BYTES.
    bytes char_data = 2;

  }

  // Variant condition: payloadSize == OSD_CHAR_VISIBLE_BYTES + 2 (56 bytes)
  message Variant3 {

    // Character slot index (0-1023).
    uint32 address = 1;

    // Visible pixel data only (no metadata).
    // MSP fixed length: OSD_CHAR_VISIBLE_BYTES.
    bytes char_data = 2;

  }

  // Variant condition: payloadSize == OSD_CHAR_VISIBLE_BYTES + 1 (55 bytes)
  message Variant4 {

    // Character slot index (0-255).
    uint32 address = 1;

    // Visible pixel data only (no metadata).
    // MSP fixed length: OSD_CHAR_VISIBLE_BYTES.
    bytes char_data = 2;

  }

  oneof variant {
    // payloadSize >= OSD_CHAR_BYTES + 2 (>=66 bytes)
    Variant1 variant_1 = 1;
    // payloadSize == OSD_CHAR_BYTES + 1 (65 bytes)
    Variant2 variant_2 = 2;
    // payloadSize == OSD_CHAR_VISIBLE_BYTES + 2 (56 bytes)
    Variant3 variant_3 = 3;
    // payloadSize == OSD_CHAR_VISIBLE_BYTES + 1 (55 bytes)
    Variant4 variant_4 = 4;
  }
}

// MSP message `MSP_VTX_CONFIG` reply payload.
// MSP code: 88.
// MSP version: 1.
// Description: Retrieves the current VTX (Video Transmitter) configuration and capabilities.
// Notes: Returns 1 byte (`VTXDEV_UNKNOWN`) when no VTX is detected or `USE_VTX_CONTROL` is disabled; otherwise sends full payload. BF compatibility field `frequency` (uint16) is missing compared to some BF versions. Use `MSP_VTXTABLE_BAND` and `MSP_VTXTABLE_POWERLEVEL` for details.
// Variable length: True.
message MSP_VTX_CONFIG_Reply {

  // Enum (`vtxDevType_e`): Type of VTX device detected/configured. `VTXDEV_UNKNOWN` if none
  vtxDevType_e vtx_device_type = 1;

  // VTX band number (from `vtxSettingsConfig`)
  uint32 band = 2;

  // VTX channel number (from `vtxSettingsConfig`)
  uint32 channel = 3;

  // VTX power level index (from `vtxSettingsConfig()`).
  uint32 power = 4;

  // Boolean: 1 if VTX is currently in pit mode, 0 otherwise.
  uint32 pit_mode = 5;

  // Boolean: 1 if VTX device reported ready, 0 otherwise
  uint32 vtx_ready = 6;

  // Enum `vtxLowerPowerDisarm_e`: Low-power behaviour while disarmed (`vtxSettingsConfig()->lowPowerDisarm`).
  // Units: Enum
  vtxLowerPowerDisarm_e low_power_disarm = 7;

  // Boolean: 1 if VTX tables (band/power) are available for query
  uint32 vtx_table_available = 8;

  // Number of bands supported by the VTX device
  uint32 band_count = 9;

  // Number of channels per band supported by the VTX device
  uint32 channel_count = 10;

  // Number of power levels supported by the VTX device
  uint32 power_count = 11;

}

// MSP message `MSP_SET_VTX_CONFIG` request payload.
// MSP code: 89.
// MSP version: 1.
// Description: Sets VTX band/channel and related options. Fields are a progressive superset based on payload length.
// Notes: Requires dataSize >= 2. If no VTX device or device type is VTXDEV_UNKNOWN, fields are read and discarded. The first uint16 is interpreted as band/channel when value <= VTXCOMMON_MSP_BANDCHAN_CHKVAL, otherwise treated as a frequency value that is not applied by this path. Subsequent fields are applied only if present. If dataSize < 2 the command returns MSP_RESULT_ERROR.
// Variable length: True.
// 7 schema variants selected by MSP payload shape.
message MSP_SET_VTX_CONFIG_Request {

  // Variant condition: payloadSize >= 14
  message Variant1 {

    // Encoded band/channel if <= `VTXCOMMON_MSP_BANDCHAN_CHKVAL`; otherwise frequency placeholder.
    uint32 band_chan_or_freq = 1;

    uint32 power = 2;

    uint32 pit_mode = 3;

    vtxLowerPowerDisarm_e low_power_disarm = 4;

    uint32 pit_mode_freq = 5;

    uint32 band = 6;

    uint32 channel = 7;

    uint32 frequency = 8;

    // Read and ignored.
    uint32 band_count = 9;

    // Read and ignored.
    uint32 channel_count = 10;

    // If 0 < value < current capability, caps `vtxDevice->capability.powerCount`.
    uint32 power_count = 11;

  }

  // Variant condition: payloadSize >= 11
  message Variant2 {

    uint32 band_chan_or_freq = 1;

    uint32 power = 2;

    uint32 pit_mode = 3;

    vtxLowerPowerDisarm_e low_power_disarm = 4;

    uint32 pit_mode_freq = 5;

    uint32 band = 6;

    uint32 channel = 7;

    // Read and ignored by INAV.
    uint32 frequency = 8;

  }

  // Variant condition: payloadSize >= 9
  message Variant3 {

    uint32 band_chan_or_freq = 1;

    uint32 power = 2;

    uint32 pit_mode = 3;

    vtxLowerPowerDisarm_e low_power_disarm = 4;

    uint32 pit_mode_freq = 5;

    // 1..N; overrides band when present.
    uint32 band = 6;

    // 1..8; overrides channel when present.
    uint32 channel = 7;

  }

  // Variant condition: payloadSize >= 7
  message Variant4 {

    uint32 band_chan_or_freq = 1;

    uint32 power = 2;

    uint32 pit_mode = 3;

    vtxLowerPowerDisarm_e low_power_disarm = 4;

    // Read and skipped.
    uint32 pit_mode_freq = 5;

  }

  // Variant condition: payloadSize >= 5
  message Variant5 {

    uint32 band_chan_or_freq = 1;

    uint32 power = 2;

    uint32 pit_mode = 3;

    // 0=Off, 1=Always, 2=Until first arm.
    vtxLowerPowerDisarm_e low_power_disarm = 4;

  }

  // Variant condition: payloadSize >= 4
  message Variant6 {

    uint32 band_chan_or_freq = 1;

    uint32 power = 2;

    uint32 pit_mode = 3;

  }

  // Variant condition: payloadSize == 2
  message Variant7 {

    // If <= `VTXCOMMON_MSP_BANDCHAN_CHKVAL`, decoded as band/channel; otherwise treated as a frequency placeholder.
    uint32 band_chan_or_freq = 1;

  }

  oneof variant {
    // payloadSize >= 14
    Variant1 variant_1 = 1;
    // payloadSize >= 11
    Variant2 variant_2 = 2;
    // payloadSize >= 9
    Variant3 variant_3 = 3;
    // payloadSize >= 7
    Variant4 variant_4 = 4;
    // payloadSize >= 5
    Variant5 variant_5 = 5;
    // payloadSize >= 4
    Variant6 variant_6 = 6;
    // payloadSize == 2
    Variant7 variant_7 = 7;
  }
}

// MSP message `MSP_ADVANCED_CONFIG` reply payload.
