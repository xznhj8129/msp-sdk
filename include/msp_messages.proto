// MSP message `MSP_CURRENT_METER_CONFIG` reply payload.
// MSP code: 40.
// MSP version: 1.
// Description: Retrieves the configuration for the current sensor.
// Notes: Scale and offset are signed values matching `batteryMetersConfig()->current` fields.
message MSP_CURRENT_METER_CONFIG_Reply {

  // Current sensor scale factor (`batteryMetersConfig()->current.scale`). Stored in 0.1 mV/A; signed for calibration.
  // Units: 0.1 mV/A
  int32 scale = 1;

  // Current sensor offset (`batteryMetersConfig()->current.offset`). Signed millivolt adjustment.
  // Units: mV
