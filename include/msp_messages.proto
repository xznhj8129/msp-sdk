  uint32 m_ah_drawn = 4;

  // Current draw (`getAmperage()`)
  // Units: 0.01A
  int32 amperage = 5;

  // Enum `batteryState_e` Current battery state (`getBatteryState()`, see `BATTERY_STATE_*`)
  // Units: Enum
  batteryState_e battery_state = 6;

  // Actual battery voltage (`getBatteryVoltage()`)
