  // Units: G * 1000
  int32 g_force_axis_min_alarm = 7;

  // Sets `osdConfigMutable()->gforce_axis_alarm_max = value / 1000.0f`
  // Units: G * 1000
  int32 g_force_axis_max_alarm = 8;

  // Sets `osdConfigMutable()->current_alarm`
  // Units: A
  uint32 current_alarm = 9;

  // Sets `osdConfigMutable()->imu_temp_alarm_min`
  // Units: degrees C
  int32 imu_temp_min_alarm = 10;

  // Sets `osdConfigMutable()->imu_temp_alarm_max`
  // Units: degrees C
  int32 imu_temp_max_alarm = 11;

  // Sets `osdConfigMutable()->baro_temp_alarm_min` (if `USE_BARO`)
  // Units: degrees C
  int32 baro_temp_min_alarm = 12;

