  // Index of the mixer profile to activate (0-based)
  uint32 mixer_profile_index = 1;

}

// MSP message `MSP2_ADSB_VEHICLE_LIST` reply payload.
// MSP code: 8336.
// MSP version: 2.
// Description: Retrieves the list of currently tracked ADSB (Automatic Dependent Surveillance–Broadcast) vehicles. See `adsbVehicle_t` and `adsbVehicleValues_t` in `io/adsb.h` for the exact structure fields.
// Notes: Requires `USE_ADSB`. Only a subset of `adsbVehicle_t` is transmitted (callsign, core values, heading in whole degrees, TSLC, emitter type, TTL).
// Variable length: maxVehicles.
message MSP2_ADSB_VEHICLE_LIST_Reply {

  // MSP repeating block. Repeats maxVehicles times.
  message RepeatingGroup1 {

    // Fixed-length callsign from `adsbVehicle->vehicleValues.callsign` (padded with NULs if shorter).
    // MSP fixed length: ADSB_CALL_SIGN_MAX_LENGTH.
    string callsign = 1;

    // ICAO address (`adsbVehicle->vehicleValues.icao`).
    uint32 icao = 2;

    // Latitude in degrees * 1e7 (`adsbVehicle->vehicleValues.lat`).
    // Units: 1e-7 deg
    int32 lat = 3;

    // Longitude in degrees * 1e7 (`adsbVehicle->vehicleValues.lon`).
    // Units: 1e-7 deg
    int32 lon = 4;

    // Altitude above sea level (`adsbVehicle->vehicleValues.alt`).
    // Units: cm
    int32 alt = 5;

    // Course over ground in whole degrees (`CENTIDEGREES_TO_DEGREES(vehicleValues.heading)`).
    // Units: deg
    uint32 heading_deg = 6;

    // Time since last communication (`adsbVehicle->vehicleValues.tslc`).
    // Units: s
    uint32 tslc = 7;

    // Emitter category (`adsbVehicle->vehicleValues.emitterType`) (refers to enum 'ADSB_EMITTER_TYPE', but none found)
    uint32 emitter_type = 8;

    // TTL counter used for list maintenance (`adsbVehicle->ttl`).
    uint32 ttl = 9;

  }

  // Maximum number of vehicles tracked (`MAX_ADSB_VEHICLES`). 0 if `USE_ADSB` disabled
  uint32 max_vehicles = 1;

  // Maximum length of callsign string (`ADSB_CALL_SIGN_MAX_LENGTH`). 0 if `USE_ADSB` disabled
  uint32 callsign_length = 2;

  // Total vehicle messages received (`getAdsbStatus()->vehiclesMessagesTotal`). 0 if `USE_ADSB` disabled
  uint32 total_vehicle_msgs = 3;

  // Total heartbeat messages received (`getAdsbStatus()->heartbeatMessagesTotal`). 0 if `USE_ADSB` disabled
  uint32 total_heartbeat_msgs = 4;

  // Repeating group. MSP repeats this block maxVehicles times.
  repeated RepeatingGroup1 max_vehicles_items = 5;

}

// MSP message `MSP2_INAV_CUSTOM_OSD_ELEMENTS` reply payload.
// MSP code: 8448.
// MSP version: 2.
// Description: Retrieves counts related to custom OSD elements defined by the programming framework.
// Notes: Requires `USE_PROGRAMMING_FRAMEWORK`.
message MSP2_INAV_CUSTOM_OSD_ELEMENTS_Reply {

  // Maximum number of custom elements (`MAX_CUSTOM_ELEMENTS`)
  uint32 max_elements = 1;

  // Maximum length of the text part (`OSD_CUSTOM_ELEMENT_TEXT_SIZE - 1`)
  uint32 max_text_length = 2;

  // Maximum number of parts per element (`CUSTOM_ELEMENTS_PARTS`)
  uint32 max_parts = 3;

}

// MSP message `MSP2_INAV_CUSTOM_OSD_ELEMENT` request payload.
// MSP code: 8449.
// MSP version: 2.
// Description: Gets the configuration of a single custom OSD element defined by the programming framework.
// Notes: Reply emitted only if idx < MAX_CUSTOM_ELEMENTS; otherwise no body is written.
message MSP2_INAV_CUSTOM_OSD_ELEMENT_Request {

  // Index of the custom element (0 to `MAX_CUSTOM_ELEMENTS - 1`)
  uint32 element_index = 1;

}

// MSP message `MSP2_INAV_CUSTOM_OSD_ELEMENT` reply payload.
// MSP code: 8449.
// MSP version: 2.
// Description: Gets the configuration of a single custom OSD element defined by the programming framework.
// Notes: Reply emitted only if idx < MAX_CUSTOM_ELEMENTS; otherwise no body is written.
message MSP2_INAV_CUSTOM_OSD_ELEMENT_Reply {

  // MSP repeating block. Repeats CUSTOM_ELEMENTS_PARTS times.
  message RepeatingGroup1 {

    // Type of this part
    osdCustomElementType_e part_type = 1;

    // Value/ID associated with this part
    uint32 part_value = 2;

  }

  // Repeating group. MSP repeats this block CUSTOM_ELEMENTS_PARTS times.
  repeated RepeatingGroup1 custom_elements_parts_items = 1;

  // Visibility condition source
  osdCustomElementTypeVisibility_e visibility_type = 2;

  // Value/ID of the visibility condition source
  uint32 visibility_value = 3;

  // Static text bytes
  // MSP fixed length: OSD_CUSTOM_ELEMENT_TEXT_SIZE - 1.
  string element_text = 4;

}

// MSP message `MSP2_INAV_SET_CUSTOM_OSD_ELEMENTS` request payload.
// MSP code: 8450.
// MSP version: 2.
// Description: Sets the configuration of one custom OSD element.
// Notes: Payload length must be (OSD_CUSTOM_ELEMENT_TEXT_SIZE - 1) + (CUSTOM_ELEMENTS_PARTS * 3) + 4 bytes including elementIndex. elementIndex must be < MAX_CUSTOM_ELEMENTS. Each partType must be < CUSTOM_ELEMENT_TYPE_END. Firmware NUL-terminates elementText internally.
message MSP2_INAV_SET_CUSTOM_OSD_ELEMENTS_Request {

  // MSP repeating block. Repeats CUSTOM_ELEMENTS_PARTS times.
  message RepeatingGroup1 {

    // Type of this part
    osdCustomElementType_e part_type = 1;

    // Value/ID associated with this part
    uint32 part_value = 2;

  }

  // Index of the custom element (0 to `MAX_CUSTOM_ELEMENTS - 1`)
  uint32 element_index = 1;

  // Repeating group. MSP repeats this block CUSTOM_ELEMENTS_PARTS times.
  repeated RepeatingGroup1 custom_elements_parts_items = 2;

  // Visibility condition source
  osdCustomElementTypeVisibility_e visibility_type = 3;

  // Value/ID of the visibility condition source
  uint32 visibility_value = 4;

  // Raw bytes
  // MSP fixed length: OSD_CUSTOM_ELEMENT_TEXT_SIZE - 1.
  string element_text = 5;

}

// MSP message `MSP2_INAV_OUTPUT_MAPPING_EXT2` reply payload.
// MSP code: 8461.
// MSP version: 2.
// Description: Retrieves the full extended output mapping configuration (timer ID, full 32-bit usage flags, and pin label). Supersedes `MSP2_INAV_OUTPUT_MAPPING_EXT`.
// Notes: Provides complete usage flags and helps identify pins repurposed for functions like LED strip.
// Variable length: for each Motor/Servo timer.
message MSP2_INAV_OUTPUT_MAPPING_EXT2_Reply {

  // Hardware timer identifier (e.g., `TIM1`, `TIM2`). SITL uses index
  uint32 timer_id = 1;

  // Full 32-bit timer usage flags (`TIM_USE_*`)
  uint32 usage_flags = 2;

  // Label for special pin usage (`PIN_LABEL_*` enum, e.g., `PIN_LABEL_LED`). 0 (`PIN_LABEL_NONE`) otherwise
  pinLabel_e pin_label = 3;

}

// MSP message `MSP2_INAV_SERVO_CONFIG` reply payload.
// MSP code: 8704.
// MSP version: 2.
// Description: Retrieves the configuration parameters for all supported servos (min, max, middle, rate). Supersedes `MSP_SERVO_CONFIGURATIONS`.
// Variable length: MAX_SUPPORTED_SERVOS.
message MSP2_INAV_SERVO_CONFIG_Reply {

  // Minimum servo endpoint (`servoParams(i)->min`)
  // Units: PWM
  int32 min = 1;

  // Maximum servo endpoint (`servoParams(i)->max`)
  // Units: PWM
  int32 max_field = 2;

  // Middle/Neutral servo position (`servoParams(i)->middle`)
  // Units: PWM
  int32 middle = 3;

  // Servo rate/scaling (`servoParams(i)->rate`)
  // Units: % (-125 to 125)
  int32 rate = 4;

}

// MSP message `MSP2_INAV_SET_SERVO_CONFIG` request payload.
// MSP code: 8705.
// MSP version: 2.
// Description: Sets the configuration parameters for a single servo. Supersedes `MSP_SET_SERVO_CONFIGURATION`.
// Notes: Expects 8 bytes. Returns error if index invalid. Calls `servoComputeScalingFactors()`.
message MSP2_INAV_SET_SERVO_CONFIG_Request {

  // Index of the servo to configure (0 to `MAX_SUPPORTED_SERVOS - 1`)
  // Units: Index
  uint32 servo_index = 1;

  // Sets minimum servo endpoint
  // Units: PWM
  int32 min = 2;

  // Sets maximum servo endpoint
  // Units: PWM
  int32 max_field = 3;

  // Sets middle/neutral servo position
  // Units: PWM
  int32 middle = 4;

  // Sets servo rate/scaling
  // Units: % (-125 to 125)
  int32 rate = 5;

}

// MSP message `MSP2_INAV_GEOZONE` request payload.
// MSP code: 8720.
// MSP version: 2.
// Description: Get configuration for a specific Geozone.
// Notes: Requires `USE_GEOZONE`. Used by `mspFcGeozoneOutCommand`.
message MSP2_INAV_GEOZONE_Request {

  // Index of the geozone (0 to `MAX_GEOZONES_IN_CONFIG - 1`)
  uint32 geozone_index = 1;

}

// MSP message `MSP2_INAV_GEOZONE` reply payload.
// MSP code: 8720.
// MSP version: 2.
// Description: Get configuration for a specific Geozone.
// Notes: Requires `USE_GEOZONE`. Used by `mspFcGeozoneOutCommand`.
message MSP2_INAV_GEOZONE_Reply {

  // Index requested
  uint32 geozone_index = 1;

  // Define (`GEOZONE_TYPE_EXCLUSIVE/INCLUSIVE`): Zone type (Inclusion/Exclusion)
  uint32 type = 2;

  // Define (`GEOZONE_SHAPE_CIRCULAR/POLYGON`): Zone shape (Polygon/Circular)
  uint32 shape = 3;

  // Minimum allowed altitude within the zone (`geoZonesConfig(idx)->minAltitude`)
  // Units: cm
  int32 min_altitude = 4;

  // Maximum allowed altitude within the zone (`geoZonesConfig(idx)->maxAltitude`)
  // Units: cm
  int32 max_altitude = 5;

  // Boolean: 1 if altitudes are relative to sea level, 0 if relative to home
  uint32 is_sea_level_ref = 6;

  // Enum (`fenceAction_e`): Action to take upon boundary violation
  // Enum `fenceAction_e` referenced in msp_messages.json but missing from inav_enums.json; emitted as `uint32`.
  uint32 fence_action = 7;

  // Number of vertices defined for this zone
  uint32 vertex_count = 8;

}

// MSP message `MSP2_INAV_SET_GEOZONE` request payload.
// MSP code: 8721.
// MSP version: 2.
// Description: Sets the main configuration for a specific Geozone (type, shape, altitude, action). **This command resets (clears) all vertices associated with the zone.**
// Notes: Requires `USE_GEOZONE`. Expects 14 bytes. Returns error if index invalid. Calls `geozoneResetVertices()`. Vertices must be set subsequently using `MSP2_INAV_SET_GEOZONE_VERTEX`.
message MSP2_INAV_SET_GEOZONE_Request {

  // Index of the geozone (0 to `MAX_GEOZONES_IN_CONFIG - 1`)
  uint32 geozone_index = 1;

  // Define (`GEOZONE_TYPE_EXCLUSIVE/INCLUSIVE`): Zone type (Inclusion/Exclusion)
  uint32 type = 2;

  // Define (`GEOZONE_SHAPE_CIRCULAR/POLYGON`): Zone shape (Polygon/Circular)
  uint32 shape = 3;

  // Minimum allowed altitude (`geoZonesConfigMutable()->minAltitude`)
  // Units: cm
  int32 min_altitude = 4;

  // Maximum allowed altitude (`geoZonesConfigMutable()->maxAltitude`)
  // Units: cm
  int32 max_altitude = 5;

  // Boolean: Altitude reference
  uint32 is_sea_level_ref = 6;

  // Enum (`fenceAction_e`): Action to take upon boundary violation
  // Enum `fenceAction_e` referenced in msp_messages.json but missing from inav_enums.json; emitted as `uint32`.
  uint32 fence_action = 7;

  // Number of vertices to be defined (used for validation later)
  uint32 vertex_count = 8;

}

// MSP message `MSP2_INAV_GEOZONE_VERTEX` request payload.
// MSP code: 8722.
// MSP version: 2.
// Description: Get a specific vertex (or center+radius for circular zones) of a Geozone.
// Notes: Requires `USE_GEOZONE`. Returns error if indexes are invalid or vertex doesn't exist. For circular zones, the radius is stored internally as the 'latitude' of the vertex with index 1.
// Variable length: True.
message MSP2_INAV_GEOZONE_VERTEX_Request {

  // Index of the geozone
  uint32 geozone_index = 1;

  // Index of the vertex within the zone (0-based). For circles, 0 = center
  uint32 vertex_id = 2;

}

// MSP message `MSP2_INAV_GEOZONE_VERTEX` reply payload.
// MSP code: 8722.
// MSP version: 2.
// Description: Get a specific vertex (or center+radius for circular zones) of a Geozone.
// Notes: Requires `USE_GEOZONE`. Returns error if indexes are invalid or vertex doesn't exist. For circular zones, the radius is stored internally as the 'latitude' of the vertex with index 1.
// Variable length: True.
message MSP2_INAV_GEOZONE_VERTEX_Reply {

  // Geozone index requested
  // Units: Index
  uint32 geozone_index = 1;

  // Vertex index requested
  // Units: Index
  uint32 vertex_id = 2;

  // Vertex latitude
  // Units: deg * 1e7
  int32 latitude = 3;

  // Vertex longitude
  // Units: deg * 1e7
  int32 longitude = 4;

  // If vertex is circle, Radius of the circular zone
  // Units: cm
  // Optional field in the MSP payload.
  int32 radius = 5;

}

// MSP message `MSP2_INAV_SET_GEOZONE_VERTEX` request payload.
// MSP code: 8723.
// MSP version: 2.
// Description: Sets a specific vertex (or center+radius for circular zones) for a Geozone.
// Notes: Requires `USE_GEOZONE`. Expects 10 bytes (Polygon) or 14 bytes (Circular). Returns error if indexes invalid or if trying to set vertex beyond `vertexCount` defined in `MSP2_INAV_SET_GEOZONE`. Calls `geozoneSetVertex()`. For circular zones, sets center (vertex 0) and radius (vertex 1's latitude).
// 2 schema variants selected by MSP payload shape.
message MSP2_INAV_SET_GEOZONE_VERTEX_Request {

  // Variant condition: polygon
  message Variant1 {

    // Geozone index requested
    // Units: Index
    uint32 geozone_index = 1;

    // Vertex index requested
    // Units: Index
    uint32 vertex_id = 2;

    // Vertex latitude
    // Units: deg * 1e7
    int32 latitude = 3;

    // Vertex longitude
    // Units: deg * 1e7
    int32 longitude = 4;

  }

  // Variant condition: circle
  message Variant2 {

    // Geozone index requested
    // Units: Index
    uint32 geozone_index = 1;

    // Vertex index requested
    // Units: Index
    uint32 vertex_id = 2;

    // Vertex/Center latitude
    // Units: deg * 1e7
    int32 latitude = 3;

    // Vertex/Center longitude
    // Units: deg * 1e7
    int32 longitude = 4;

    // Radius of the circular zone
    // Units: cm
    int32 radius = 5;

  }

  oneof variant {
    // polygon
    Variant1 variant_1 = 1;
    // circle
    Variant2 variant_2 = 2;
  }
}

// MSP message `MSP2_INAV_SET_GVAR` request payload.
// MSP code: 8724.
// MSP version: 2.
// Description: Sets the specified Global Variable (GVAR) to the provided value.
// Notes: Requires `USE_PROGRAMMING_FRAMEWORK`. Expects 5 bytes. Returns error if index is outside `MAX_GLOBAL_VARIABLES`.
message MSP2_INAV_SET_GVAR_Request {

  // Index of the Global Variable to set
  // Units: Index
  uint32 gvar_index = 1;

  // New value to store (clamped to configured min/max by `gvSet()`)
  int32 value = 2;

}

// MSP message `MSP2_INAV_SET_ALT_TARGET` request payload.
// MSP code: 8725.
// MSP version: 2.
// Description: Set the active altitude hold target using updateClimbRateToAltitudeController.
// Notes: Set new altitude target. Requires 5-byte payload (datum + target) and is set-only. Valid only in NAV or ALTHOLD modes. Command is rejected unless altitude control is active, not landing/emergency landing, altitude estimation is valid, and datum is supported (MSL requires valid GPS origin; TERRAIN is reserved and rejected).
message MSP2_INAV_SET_ALT_TARGET_Request {

  // Altitude reference datum flag (`geoAltitudeDatumFlag_e`): `NAV_WP_TAKEOFF_DATUM` (default), `NAV_WP_MSL_DATUM`, `NAV_WP_TERRAIN_DATUM` (not implemented yet)
  geoAltitudeDatumFlag_e altitude_datum = 1;

  // Desired altitude target according to reference datum
  // Units: cm
  int32 altitude_target = 2;

}

// MSP message `MSP2_INAV_FLIGHT_AXIS_ANGLE_OVERRIDE` request payload.
// MSP code: 8726.
// MSP version: 2.
// Description: Enables or disables a flight-axis angle override for the selected axis.
// Notes: Uses the same override path as logic conditions and bypasses stick-derived angle targets.
message MSP2_INAV_FLIGHT_AXIS_ANGLE_OVERRIDE_Request {

  // Bitmask of desired-state fields that follow (Roll, Pitch, Yaw). Non-zero enables the override; zero disables it for that axis.
  // Units: Bitmask
  // Bitmask field.
  uint32 override_mask = 1;

  // Angle target in deci-degrees. Roll/Pitch clamped to configured angle limits
  // Units: deci-degrees
  int32 angle_target_roll = 2;

  // Angle target in deci-degrees. Roll/Pitch clamped to configured angle limits
  // Units: deci-degrees
  int32 angle_target_pitch = 3;

  // Angle target in deci-degrees. Yaw clamped to 0–3600.
  // Units: deci-degrees
  int32 angle_target_yaw = 4;

}

// MSP message `MSP2_INAV_FLIGHT_AXIS_RATE_OVERRIDE` request payload.
// MSP code: 8727.
// MSP version: 2.
// Description: Enables or disables a flight-axis rate override for the selected axis.
// Notes: Expects 7 bytes. Overrides rate targets just before control is applied, bypassing stick-derived setpoints.
message MSP2_INAV_FLIGHT_AXIS_RATE_OVERRIDE_Request {

  // Bitmask of desired-state fields that follow (Roll, Pitch, Yaw). Non-zero enables the override; zero disables it for that axis.
  // Units: Bitmask
  // Bitmask field.
  uint32 override_mask = 1;

  // Rate target, clamped to ±2000
  // Units: deg/s
  int32 rate_target_roll = 2;

  // Rate target, clamped to ±2000
  // Units: deg/s
  int32 rate_target_pitch = 3;

  // Rate target, clamped to ±2000
  // Units: deg/s
  int32 rate_target_yaw = 4;

}

// MSP message `MSP2_INAV_SET_LOCAL_TARGET` request payload.
// MSP code: 8728.
// MSP version: 2.
// Description: Sets a body-frame offset target relative to the current vehicle position.
// Notes: Offsets are in the vehicle body frame (forward/right/up, cm) and are rotated into the NEU frame using the current yaw, applied relative to current position. Z offset is always provided; Z=0 keeps current altitude, non-zero offsets are relative to current altitude. Requires GCSNAV/offboard to be active and a valid guided poshold; updates the navigation desired position via `setDesiredPosition()`.
// Variable length: True.
message MSP2_INAV_SET_LOCAL_TARGET_Request {

  // Desired X in local NEU frame
  // Units: cm
  int32 pos_x = 1;

  // Desired Y in local NEU frame
  // Units: cm
  int32 pos_y = 2;

  // Desired Z in local NEU frame (up-positive). Omit this field to leave Z unchanged.
  // Units: cm
  // Optional field in the MSP payload.
  int32 pos_z = 3;

}

// MSP message `MSP2_INAV_LOCAL_TARGET` reply payload.
// MSP code: 8729.
// MSP version: 2.
// Description: Returns the current navigation desired state (position, velocity, yaw, and climb rate).
// Notes: Local frame is NEU. Mirrors `posControl.desiredState` (position, velocity, yaw, climb rate) used by the position controller.
message MSP2_INAV_LOCAL_TARGET_Reply {

  // Desired X in local NEU frame (`posControl.desiredState.pos.x`)
  // Units: cm
  int32 pos_x = 1;

  // Desired Y in local NEU frame (`posControl.desiredState.pos.y`)
  // Units: cm
  int32 pos_y = 2;

  // Desired Z in local NEU frame (`posControl.desiredState.pos.z`, up-positive)
  // Units: cm
  int32 pos_z = 3;

  // Desired X velocity (`posControl.desiredState.vel.x`)
  // Units: cm/s
  int32 vel_x = 4;

  // Desired Y velocity (`posControl.desiredState.vel.y`)
  // Units: cm/s
  int32 vel_y = 5;

  // Desired Z velocity (`posControl.desiredState.vel.z`)
  // Units: cm/s
  int32 vel_z = 6;

  // Desired heading (`posControl.desiredState.yaw`)
  // Units: centi-degrees
  int32 yaw = 7;

  // Desired climb rate demand (`posControl.desiredState.climbRateDemand`)
  // Units: cm/s
  int32 climb_rate = 8;

}

// MSP message `MSP2_INAV_SET_GLOBAL_TARGET` request payload.
// MSP code: 8730.
// MSP version: 2.
// Description: Sets desired GCS Nav position with global coordinates (WP 254/GOTO).
// Notes: Uses the GCSNAV/offboard path; rejected when GCSNAV is not active. Rejects `NAV_WP_TERRAIN_DATUM`; other datums are converted to local NEU and applied through `setDesiredPosition()`. Altitude of 0 leaves current Z unchanged.
message MSP2_INAV_SET_GLOBAL_TARGET_Request {

  // Latitude coordinate
  // Units: deg * 1e7
  int32 latitude = 1;

  // Longitude coordinate
  // Units: deg * 1e7
  int32 longitude = 2;

  // Desired altitude target according to reference datum (0 keeps current altitude)
  // Units: cm
  int32 altitude_target = 3;

  // Altitude reference datum flag (`geoAltitudeDatumFlag_e`): `NAV_WP_TAKEOFF_DATUM`, `NAV_WP_MSL_DATUM`, `NAV_WP_TERRAIN_DATUM` (not implemented yet)
  geoAltitudeDatumFlag_e altitude_datum = 4;

}

// MSP message `MSP2_INAV_NAV_TARGET` reply payload.
// MSP code: 8731.
// MSP version: 2.
// Description: Returns the current navigation desired global target (lat/lon/alt, heading, climb rate).
// Notes: Altitude target is reported in the takeoff datum frame (local Z). Heading is sourced from the heading-hold target. Intended for monitoring the active navigation desired target (Goto/Followme/RTH/Safehome).
message MSP2_INAV_NAV_TARGET_Reply {

  // Latitude in degrees * 1e7
  // Units: 1e-7 deg
  int32 lat_target = 1;

  // Longitude in degrees * 1e7
  // Units: 1e-7 deg
  int32 lon_target = 2;

  // Desired altitude target (takeoff datum, cm) as used by altitude/position hold
  // Units: cm
  int32 altitude_target = 3;

  // Current heading-hold target (`getHeadingHoldTarget()`), wrapped to 0–359.99
  // Units: degrees
  uint32 heading_target = 4;

  // Desired climb rate demand (`posControl.desiredState.climbRateDemand`)
  // Units: cm/s
  int32 climb_rate = 5;

}

// MSP message `MSP2_INAV_FULL_LOCAL_POSE` reply payload.
// MSP code: 8736.
// MSP version: 2.
// Description: Provides estimates of current attitude, local NEU position, and velocity.
// Notes: All attitude angles are in deci-degrees.
message MSP2_INAV_FULL_LOCAL_POSE_Reply {

  // Roll angle (`attitude.values.roll`)
  // Units: deci-degrees
  int32 roll = 1;

  // Pitch angle (`attitude.values.pitch`)
  // Units: deci-degrees
  int32 pitch = 2;

  // Yaw/Heading angle (`attitude.values.yaw`)
  // Units: deci-degrees
  int32 yaw = 3;

  // Estimated North coordinate in local NEU frame (`posControl.actualState.abs.pos.x`)
  // Units: cm
  int32 local_position_north = 4;

  // Estimated North component of velocity in local NEU frame (`posControl.actualState.abs.vel.x`)
  // Units: cm/s
  int32 local_velocity_north = 5;

  // Estimated East coordinate in local NEU frame (`posControl.actualState.abs.pos.y`)
  // Units: cm
  int32 local_position_east = 6;

  // Estimated East component of velocity in local NEU frame (`posControl.actualState.abs.vel.y`)
  // Units: cm/s
  int32 local_velocity_east = 7;

  // Estimated Up coordinate in local NEU frame (`posControl.actualState.abs.pos.z`)
  // Units: cm
  int32 local_position_up = 8;

  // Estimated Up component of velocity in local NEU frame (`posControl.actualState.abs.vel.z`)
  // Units: cm/s
  int32 local_velocity_up = 9;

}
