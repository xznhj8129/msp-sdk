// MSP message `MSP_SIMULATOR` request payload.
// MSP code: 8223.
// MSP version: 2.
// Description: Handles Hardware-in-the-Loop (HITL) simulation data exchange. Receives simulated sensor data and options, sends back control outputs and debug info.
// Notes: Requires `USE_SIMULATOR`. Complex message handling state changes for enabling/disabling HITL. Sensor data is injected directly. OSD data is sent using a custom RLE scheme. See `simulatorData` struct and associated code for details.
// Variable length: True.
message MSP_SIMULATOR_Request {

  // Version of the simulator protocol (`SIMULATOR_MSP_VERSION`)
  uint32 simulator_version = 1;

  // Bitmask: Options for HITL (`HITL_*` flags)
  // Units: Bitmask
  // Bitmask field.
  uint32 simulator_flags_t = 2;

  // Enum `gpsFixType_e` Type of GPS fix (If `HITL_HAS_NEW_GPS_DATA`)
  // Units: Enum
  gpsFixType_e gps_fix_type = 3;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated satellite count
  uint32 gps_num_sat = 4;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated latitude (1e7 deg)
  int32 gps_lat = 5;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated longitude (1e7 deg)
  int32 gps_lon = 6;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated altitude (cm)
  int32 gps_alt = 7;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated ground speed (cm/s)
  uint32 gps_speed = 8;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated ground course (deci-deg)
  uint32 gps_course = 9;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated North velocity (cm/s)
  int32 gps_vel_n = 10;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated East velocity (cm/s)
  int32 gps_vel_e = 11;

  // (If `HITL_HAS_NEW_GPS_DATA`) Simulated Down velocity (cm/s)
  int32 gps_vel_d = 12;

  // (If NOT `HITL_USE_IMU`) Simulated Roll (deci-deg)
  int32 imu_roll = 13;

  // (If NOT `HITL_USE_IMU`) Simulated Pitch (deci-deg)
  int32 imu_pitch = 14;

  // (If NOT `HITL_USE_IMU`) Simulated Yaw (deci-deg)
  int32 imu_yaw = 15;

  // mG (G * 1000)
  int32 acc_x = 16;

  // mG (G * 1000)
  int32 acc_y = 17;

  // mG (G * 1000)
  int32 acc_z = 18;

  // dps * 16
  int32 gyro_x = 19;

  // dps * 16
  int32 gyro_y = 20;

  // dps * 16
  int32 gyro_z = 21;

  // Pa
  uint32 baro_pressure = 22;

  // Scaled
  int32 mag_x = 23;

  // Scaled
  int32 mag_y = 24;

  // Scaled
  int32 mag_z = 25;

  // (If `HITL_EXT_BATTERY_VOLTAGE`) Simulated battery voltage (0.1V units)
  uint32 vbat = 26;

  // (If `HITL_AIRSPEED`) Simulated airspeed (cm/s)
  uint32 airspeed = 27;

  // (If `HITL_EXTENDED_FLAGS`) Additional flags (upper 8 bits)
  uint32 ext_flags = 28;

}

// MSP message `MSP_SIMULATOR` reply payload.
// MSP code: 8223.
// MSP version: 2.
// Description: Handles Hardware-in-the-Loop (HITL) simulation data exchange. Receives simulated sensor data and options, sends back control outputs and debug info.
// Notes: Requires `USE_SIMULATOR`. Complex message handling state changes for enabling/disabling HITL. Sensor data is injected directly. OSD data is sent using a custom RLE scheme. See `simulatorData` struct and associated code for details.
// Variable length: True.
message MSP_SIMULATOR_Reply {

  // Stabilized Roll command output (-500 to 500)
  uint32 stabilized_roll = 1;

  // Stabilized Pitch command output (-500 to 500)
  uint32 stabilized_pitch = 2;

  // Stabilized Yaw command output (-500 to 500)
  uint32 stabilized_yaw = 3;

  // Stabilized Throttle command output (-500 to 500 if armed, else -500)
  uint32 stabilized_throttle = 4;

  // Packed flags: Debug index (0-7), Platform type, Armed state, OSD feature status
  uint32 debug_flags = 5;

  // Current debug value (`debug[simulatorData.debugIndex]`)
  uint32 debug_value = 6;

  // Current estimated Roll (deci-deg)
  int32 attitude_roll = 7;

  // Current estimated Pitch (deci-deg)
  int32 attitude_pitch = 8;

  // Current estimated Yaw (deci-deg)
  int32 attitude_yaw = 9;

  // OSD RLE Header (255)
  // Optional field in the MSP payload.
  uint32 osd_header = 10;

  // (If OSD supported) Number of OSD rows
  // Optional field in the MSP payload.
  uint32 osd_rows = 11;

  // (If OSD supported) Number of OSD columns
  // Optional field in the MSP payload.
  uint32 osd_cols = 12;

  // (If OSD supported) Starting row for RLE data
  // Optional field in the MSP payload.
  uint32 osd_start_y = 13;

  // (If OSD supported) Starting column for RLE data
  // Optional field in the MSP payload.
  uint32 osd_start_x = 14;

  // (If OSD supported) Run-length encoded OSD character data. Terminated by `[0, 0]`
  // Optional field in the MSP payload.
  // MSP variable-length array.
  bytes osd_rle_data = 15;

}

// MSP message `MSP2_INAV_SERVO_MIXER` reply payload.
// MSP code: 8224.
// MSP version: 2.
// Description: Retrieves the custom servo mixer rules, including programming framework condition IDs, for primary and secondary mixer profiles. Supersedes `MSP_SERVO_MIX_RULES`.
// Notes: `conditionId` requires `USE_PROGRAMMING_FRAMEWORK`.
// Variable length: MAX_SERVO_RULES.
message MSP2_INAV_SERVO_MIXER_Reply {

  // Servo output channel index (0-based)
  uint32 target_channel = 1;

  // Enum `inputSource_e` Input source
  inputSource_e input_source = 2;

  // Mixing rate/weight
  int32 rate = 3;

  // Speed/Slew rate limit (0-100)
  uint32 speed = 4;

  // Logic Condition ID (0 to `MAX_LOGIC_CONDITIONS - 1`, or 255/-1 if none/disabled)
  int32 condition_id = 5;

  // (Optional) Profile 2 Target channel
  // Optional field in the MSP payload.
  uint32 p2_target_channel = 6;

  // (Optional) Profile 2 Enum `inputSource_e` Input source
  // Optional field in the MSP payload.
  inputSource_e p2_input_source = 7;

  // (Optional) Profile 2 Rate
  // Optional field in the MSP payload.
  int32 p2_rate = 8;

  // (Optional) Profile 2 Speed
  // Optional field in the MSP payload.
  uint32 p2_speed = 9;

  // (Optional) Profile 2 Logic Condition ID
  // Optional field in the MSP payload.
  int32 p2_condition_id = 10;

}

// MSP message `MSP2_INAV_SET_SERVO_MIXER` request payload.
// MSP code: 8225.
// MSP version: 2.
// Description: Sets a single custom servo mixer rule, including programming framework condition ID. Supersedes `MSP_SET_SERVO_MIX_RULE`.
// Notes: Expects 7 bytes. Returns error if index invalid. Calls `loadCustomServoMixer()`.
message MSP2_INAV_SET_SERVO_MIXER_Request {

  // Index of the rule to set (0 to `MAX_SERVO_RULES - 1`)
  uint32 rule_index = 1;

  // Servo output channel index
  uint32 target_channel = 2;

  // Enum `inputSource_e` Input source
  inputSource_e input_source = 3;

  // Mixing rate/weight
  int32 rate = 4;

  // Speed/Slew rate limit (0-100)
  uint32 speed = 5;

  // Logic Condition ID (255/-1 if none). Ignored if `USE_PROGRAMMING_FRAMEWORK` is disabled
  int32 condition_id = 6;

}

// MSP message `MSP2_INAV_LOGIC_CONDITIONS` reply payload.
// MSP code: 8226.
// MSP version: 2.
// Description: Retrieves the configuration of all defined Logic Conditions. Requires `USE_PROGRAMMING_FRAMEWORK`. See `logicCondition_t` structure.
// Notes: Deprecated, causes buffer overflow for 14*64 bytes
// Variable length: MAX_LOGIC_CONDITIONS.
message MSP2_INAV_LOGIC_CONDITIONS_Reply {

  // Boolean: 1 if the condition is enabled
  uint32 enabled = 1;

  // Activator condition ID (-1/255 if none)
  int32 activator_id = 2;

  // Enum `logicOperation_e` Logical operation (AND, OR, XOR, etc.)
  logicOperation_e operation = 3;

  // Enum `logicOperandType_e` Type of the first operand (Flight Mode, GVAR, etc.)
  logicOperandType_e operand_atype = 4;

  // Value/ID of the first operand
  int32 operand_avalue = 5;

  // Enum `logicOperandType_e`: Type of the second operand
  logicOperandType_e operand_btype = 6;

  // Value/ID of the second operand
  int32 operand_bvalue = 7;

  // Bitmask: Condition flags (`logicConditionFlags_e`)
  // Units: Bitmask
  // Bitmask field.
  uint32 flags = 8;

}

// MSP message `MSP2_INAV_SET_LOGIC_CONDITIONS` request payload.
// MSP code: 8227.
// MSP version: 2.
// Description: Sets the configuration for a single Logic Condition by its index.
// Notes: Requires `USE_PROGRAMMING_FRAMEWORK`. Expects 15 bytes. Returns error if index is invalid.
message MSP2_INAV_SET_LOGIC_CONDITIONS_Request {

  // Index of the condition to set (0 to `MAX_LOGIC_CONDITIONS - 1`)
  uint32 condition_index = 1;

  // Boolean: 1 to enable the condition
  uint32 enabled = 2;

  // Activator condition ID (-1/255 if none)
  int32 activator_id = 3;

  // Enum `logicOperation_e` Logical operation
  logicOperation_e operation = 4;

  // Enum `logicOperandType_e` Type of operand A
  logicOperandType_e operand_atype = 5;

  // Value/ID of operand A
  int32 operand_avalue = 6;

  // Enum `logicOperandType_e` Type of operand B
  logicOperandType_e operand_btype = 7;

  // Value/ID of operand B
  int32 operand_bvalue = 8;

  // Bitmask: Condition flags (`logicConditionFlags_e`)
  // Units: Bitmask
  // Bitmask field.
  uint32 flags = 9;

}

// MSP message `MSP2_INAV_LOGIC_CONDITIONS_STATUS` reply payload.
// MSP code: 8230.
// MSP version: 2.
// Description: Retrieves the current evaluated status (true/false or numerical value) of all logic conditions.
// Notes: Requires `USE_PROGRAMMING_FRAMEWORK`.
// Variable length: True.
message MSP2_INAV_LOGIC_CONDITIONS_STATUS_Reply {

  // Array of current values for each logic condition (`logicConditionGetValue(i)`). 1 for true, 0 for false, or numerical value depending on operation
  // MSP fixed length: MAX_LOGIC_CONDITIONS.
  repeated int32 condition_values = 1;

}

// MSP message `MSP2_INAV_GVAR_STATUS` reply payload.
// MSP code: 8231.
// MSP version: 2.
// Description: Retrieves the current values of all Global Variables (GVARS).
// Notes: Requires `USE_PROGRAMMING_FRAMEWORK`.
// Variable length: True.
message MSP2_INAV_GVAR_STATUS_Reply {

  // Array of current values for each global variable (`gvGet(i)`)
  // MSP fixed length: MAX_GLOBAL_VARIABLES.
  repeated int32 gvar_values = 1;

}

// MSP message `MSP2_INAV_PROGRAMMING_PID` reply payload.
// MSP code: 8232.
// MSP version: 2.
// Description: Retrieves the configuration of all Programming PIDs.
// Notes: Requires `USE_PROGRAMMING_FRAMEWORK`. See `programmingPid_t` structure.
// Variable length: MAX_PROGRAMMING_PID_COUNT.
message MSP2_INAV_PROGRAMMING_PID_Reply {

  // Boolean: 1 if the PID is enabled
  uint32 enabled = 1;

  // Enum (`logicOperandType_e`) Type of the setpoint source
  logicOperandType_e setpoint_type = 2;

  // Value/ID of the setpoint source
  int32 setpoint_value = 3;

  // Enum (`logicOperandType_e`) Type of the measurement source
  logicOperandType_e measurement_type = 4;

  // Value/ID of the measurement source
  int32 measurement_value = 5;

  // Proportional gain
  uint32 gain_p = 6;

  // Integral gain
  uint32 gain_i = 7;

  // Derivative gain
  uint32 gain_d = 8;

  // Feed-forward gain
  uint32 gain_ff = 9;

}

// MSP message `MSP2_INAV_SET_PROGRAMMING_PID` request payload.
// MSP code: 8233.
// MSP version: 2.
// Description: Sets the configuration for a single Programming PID by its index.
// Notes: Requires `USE_PROGRAMMING_FRAMEWORK`. Expects 20 bytes. Returns error if index is invalid.
message MSP2_INAV_SET_PROGRAMMING_PID_Request {

  // Index of the Programming PID to set (0 to `MAX_PROGRAMMING_PID_COUNT - 1`)
  uint32 pid_index = 1;

  // Boolean: 1 to enable the PID
  uint32 enabled = 2;

  // Enum (`logicOperandType_e`) Type of the setpoint source
  logicOperandType_e setpoint_type = 3;

  // Value/ID of the setpoint source
  int32 setpoint_value = 4;

  // Enum (`logicOperandType_e`) Type of the measurement source
  logicOperandType_e measurement_type = 5;

  // Value/ID of the measurement source
  int32 measurement_value = 6;

  // Proportional gain
  uint32 gain_p = 7;

  // Integral gain
  uint32 gain_i = 8;

  // Derivative gain
  uint32 gain_d = 9;

  // Feed-forward gain
  uint32 gain_ff = 10;

}

// MSP message `MSP2_INAV_PROGRAMMING_PID_STATUS` reply payload.
// MSP code: 8234.
// MSP version: 2.
// Description: Retrieves the current output value of all Programming PIDs.
// Notes: Requires `USE_PROGRAMMING_FRAMEWORK`.
// Variable length: True.
message MSP2_INAV_PROGRAMMING_PID_STATUS_Reply {

  // Array of current output values for each Programming PID (`programmingPidGetOutput(i)`, signed)
  // MSP fixed length: MAX_PROGRAMMING_PID_COUNT.
  repeated int32 pid_outputs = 1;

}

// MSP message `MSP2_PID` reply payload.
// MSP code: 8240.
// MSP version: 2.
// Description: Retrieves the standard PID controller gains (P, I, D, FF) for the current PID profile.
// Notes: `PID_ITEM_COUNT` defines the number of standard PID controllers (Roll, Pitch, Yaw, Alt, Vel, etc.). Updates from EZ-Tune if enabled.
// Variable length: PID_ITEM_COUNT.
message MSP2_PID_Reply {

  // Proportional gain (`pidBank()->pid[i].P`), constrained 0-255
  uint32 p = 1;

  // Integral gain (`pidBank()->pid[i].I`), constrained 0-255
  uint32 i = 2;

  // Derivative gain (`pidBank()->pid[i].D`), constrained 0-255
  uint32 d = 3;

  // Feed-forward gain (`pidBank()->pid[i].FF`), constrained 0-255
  uint32 ff = 4;

}

// MSP message `MSP2_SET_PID` request payload.
// MSP code: 8241.
// MSP version: 2.
// Description: Sets the standard PID controller gains (P, I, D, FF) for the current PID profile.
// Notes: Expects `PID_ITEM_COUNT * 4` bytes. Calls `schedulePidGainsUpdate()` and `navigationUsePIDs()`.
// Variable length: PID_ITEM_COUNT.
message MSP2_SET_PID_Request {

  // Sets Proportional gain (`pidBankMutable()->pid[i].P`)
  uint32 p = 1;

  // Sets Integral gain (`pidBankMutable()->pid[i].I`)
  uint32 i = 2;

  // Sets Derivative gain (`pidBankMutable()->pid[i].D`)
  uint32 d = 3;

  // Sets Feed-forward gain (`pidBankMutable()->pid[i].FF`)
  uint32 ff = 4;

}

// MSP message `MSP2_INAV_FWUPDT_PREPARE` request payload.
// MSP code: 8243.
// MSP version: 2.
// Description: Prepares the flight controller to receive a firmware update via MSP.
// Notes: Requires `MSP_FIRMWARE_UPDATE`. Expects 4 bytes. Returns error if preparation fails (e.g., no storage, invalid size). Calls `firmwareUpdatePrepare()`.
message MSP2_INAV_FWUPDT_PREPARE_Request {

  // Total size of the incoming firmware file in bytes
  uint32 firmware_size = 1;

}

// MSP message `MSP2_INAV_FWUPDT_STORE` request payload.
// MSP code: 8244.
// MSP version: 2.
// Description: Stores a chunk of firmware data received via MSP.
// Notes: Requires `MSP_FIRMWARE_UPDATE`. Returns error if storage fails (e.g., out of space, checksum error). Called repeatedly until the entire firmware is transferred. Calls `firmwareUpdateStore()`.
// Variable length: True.
message MSP2_INAV_FWUPDT_STORE_Request {

  // Chunk of firmware data
  // MSP variable-length array.
  bytes firmware_chunk = 1;

}

// MSP message `MSP2_INAV_FWUPDT_EXEC` request payload.
// MSP code: 8245.
// MSP version: 2.
// Description: Executes the firmware update process (flashes the stored firmware and reboots).
// Notes: Requires `MSP_FIRMWARE_UPDATE`. Expects 1 byte. Returns error if update cannot start (e.g., not fully received). Calls `firmwareUpdateExec()`. If successful, the device will reboot into the new firmware.
message MSP2_INAV_FWUPDT_EXEC_Request {

  // Type of update (e.g., full flash, specific section - currently ignored/unused)
  uint32 update_type = 1;

}

