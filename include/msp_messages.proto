// MSP message `MSP_API_VERSION` reply payload.
// MSP code: 1.
// MSP version: 1.
// Description: Provides the MSP protocol version and the INAV API version.
// Notes: Used by configurators to check compatibility.
message MSP_API_VERSION_Reply {

  // MSP Protocol version (`MSP_PROTOCOL_VERSION`, typically 0)
  uint32 msp_protocol_version = 1;

  // INAV API Major version (`API_VERSION_MAJOR`)
  uint32 api_version_major = 2;

  // INAV API Minor version (`API_VERSION_MINOR`)
  uint32 api_version_minor = 3;

}

// MSP message `MSP_FC_VARIANT` reply payload.
// MSP code: 2.
// MSP version: 1.
// Description: Identifies the flight controller firmware variant (e.g., INAV, Betaflight).
// Notes: See `FLIGHT_CONTROLLER_IDENTIFIER_LENGTH`.
message MSP_FC_VARIANT_Reply {

  // 4-character identifier string (e.g., "INAV"). Defined by `flightControllerIdentifier`.
  // MSP fixed length: 4.
  string fc_variant_identifier = 1;

}

// MSP message `MSP_FC_VERSION` reply payload.
// MSP code: 3.
// MSP version: 1.
// Description: Provides the specific version number of the flight controller firmware.
message MSP_FC_VERSION_Reply {

  // Firmware Major version (`FC_VERSION_MAJOR`)
  uint32 fc_version_major = 1;

  // Firmware Minor version (`FC_VERSION_MINOR`)
  uint32 fc_version_minor = 2;

  // Firmware Patch level (`FC_VERSION_PATCH_LEVEL`)
  uint32 fc_version_patch = 3;

}

// MSP message `MSP_BOARD_INFO` reply payload.
// MSP code: 4.
// MSP version: 1.
// Description: Provides information about the specific hardware board and its capabilities.
// Notes: `BOARD_IDENTIFIER_LENGTH` is 4.
// Variable length: True.
message MSP_BOARD_INFO_Reply {

  // 4-character UPPER CASE board identifier (`TARGET_BOARD_IDENTIFIER`)
  // MSP fixed length: 4.
  string board_identifier = 1;

  // Hardware revision number. 0 if not detected (`USE_HARDWARE_REVISION_DETECTION`)
  uint32 hardware_revision = 2;

  // OSD chip type: 0=None, 2=Onboard (`USE_OSD`). INAV does not support slave OSD (1)
  uint32 osd_support = 3;

  // Bitmask: Communication capabilities: Bit 0=VCP support (`USE_VCP`), Bit 1=SoftSerial support (`USE_SOFTSERIAL1`/`2`)
  // Units: Bitmask
  // Bitmask field.
  uint32 comm_capabilities = 4;

  // Length of the target name string that follows
  uint32 target_name_length = 5;

  // Target name string (e.g., "MATEKF405"). Length given by previous field
  // MSP variable-length array.
  string target_name = 6;

}

// MSP message `MSP_BUILD_INFO` reply payload.
