  // Accelerometer zero offset for X-axis (`accelerometerConfig()->accZero.raw[X]`)
  // Units: Raw ADC
  int32 acc_zero_x = 2;

  // Accelerometer zero offset for Y-axis (`accelerometerConfig()->accZero.raw[Y]`)
  // Units: Raw ADC
  int32 acc_zero_y = 3;

  // Accelerometer zero offset for Z-axis (`accelerometerConfig()->accZero.raw[Z]`)
  // Units: Raw ADC
  int32 acc_zero_z = 4;

  // Accelerometer gain/scale for X-axis (`accelerometerConfig()->accGain.raw[X]`)
  // Units: Raw ADC
  int32 acc_gain_x = 5;

  // Accelerometer gain/scale for Y-axis (`accelerometerConfig()->accGain.raw[Y]`)
  // Units: Raw ADC
  int32 acc_gain_y = 6;

  // Accelerometer gain/scale for Z-axis (`accelerometerConfig()->accGain.raw[Z]`)
  // Units: Raw ADC
  int32 acc_gain_z = 7;

  // Magnetometer zero offset for X-axis (`compassConfig()->magZero.raw[X]`). 0 if `USE_MAG` disabled
  // Units: Raw ADC
  int32 mag_zero_x = 8;

  // Magnetometer zero offset for Y-axis (`compassConfig()->magZero.raw[Y]`). 0 if `USE_MAG` disabled
  // Units: Raw ADC
  int32 mag_zero_y = 9;

  // Magnetometer zero offset for Z-axis (`compassConfig()->magZero.raw[Z]`). 0 if `USE_MAG` disabled
  // Units: Raw ADC
  int32 mag_zero_z = 10;

  // Optical flow scale factor (`opticalFlowConfig()->opflow_scale * 256`). 0 if `USE_OPFLOW` disabled
  // Units: Scale * 256
  uint32 opflow_scale = 11;

  // Magnetometer gain/scale for X-axis (`compassConfig()->magGain[X]`). 0 if `USE_MAG` disabled
  // Units: Raw ADC
  int32 mag_gain_x = 12;

  // Magnetometer gain/scale for Y-axis (`compassConfig()->magGain[Y]`). 0 if `USE_MAG` disabled
  // Units: Raw ADC
  int32 mag_gain_y = 13;

  // Magnetometer gain/scale for Z-axis (`compassConfig()->magGain[Z]`). 0 if `USE_MAG` disabled
  // Units: Raw ADC
  int32 mag_gain_z = 14;

}

