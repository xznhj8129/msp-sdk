// MSP message `MSP_SENSOR_CONFIG` reply payload.
// MSP code: 96.
// MSP version: 1.
// Description: Retrieves the configured hardware type for various sensors.
message MSP_SENSOR_CONFIG_Reply {

  // Enum (`accelerationSensor_e`): Accelerometer hardware type (`accelerometerConfig()->acc_hardware`)
  accelerationSensor_e acc_hardware = 1;

  // Enum (`baroSensor_e`): Barometer hardware type (`barometerConfig()->baro_hardware`). 0 if `USE_BARO` disabled
  baroSensor_e baro_hardware = 2;

  // Enum (`magSensor_e`): Magnetometer hardware type (`compassConfig()->mag_hardware`). 0 if `USE_MAG` disabled
  magSensor_e mag_hardware = 3;

  // Enum (`pitotSensor_e`): Pitot tube hardware type (`pitotmeterConfig()->pitot_hardware`). 0 if `USE_PITOT` disabled
  pitotSensor_e pitot_hardware = 4;

  // Enum (`rangefinderType_e`): Rangefinder hardware type (`rangefinderConfig()->rangefinder_hardware`). 0 if `USE_RANGEFINDER` disabled
  rangefinderType_e rangefinder_hardware = 5;

  // Enum (`opticalFlowSensor_e`): Optical flow hardware type (`opticalFlowConfig()->opflow_hardware`). 0 if `USE_OPFLOW` disabled
  opticalFlowSensor_e opflow_hardware = 6;

}

// MSP message `MSP_SET_SENSOR_CONFIG` request payload.
// MSP code: 97.
// MSP version: 1.
// Description: Sets the configured hardware type for various sensors.
// Notes: Expects 6 bytes.
message MSP_SET_SENSOR_CONFIG_Request {

  // Sets `accelerometerConfigMutable()->acc_hardware`
  accelerationSensor_e acc_hardware = 1;

  // Sets `barometerConfigMutable()->baro_hardware` (if `USE_BARO`)
  baroSensor_e baro_hardware = 2;

  // Sets `compassConfigMutable()->mag_hardware` (if `USE_MAG`)
  magSensor_e mag_hardware = 3;

  // Sets `pitotmeterConfigMutable()->pitot_hardware` (if `USE_PITOT`)
  pitotSensor_e pitot_hardware = 4;

  // Sets `rangefinderConfigMutable()->rangefinder_hardware` (if `USE_RANGEFINDER`)
  rangefinderType_e rangefinder_hardware = 5;

  // Sets `opticalFlowConfigMutable()->opflow_hardware` (if `USE_OPFLOW`)
  opticalFlowSensor_e opflow_hardware = 6;

}

// MSP message `MSP_IDENT` reply payload.
// MSP code: 100.
// MSP version: 1.
// Description: Provides basic flight controller identity information. Not implemented in modern INAV, but used by legacy versions and MultiWii.
// Notes: Obsolete. Listed for legacy compatibility only.
message MSP_IDENT_Reply {

  // Scaled version major*100+minor
  // Units: n/a
  uint32 multi_wii_version = 1;

  // Mixer type
  // Units: Enum
  uint32 mixer_mode = 2;

  // Scaled version major*100+minor
  // Units: n/a
  uint32 msp_version = 3;

  // Bitmask: MW capabilities
  // Units: Bitmask
  // Bitmask field.
  uint32 platform_capability = 4;

}

// MSP message `MSP_STATUS` reply payload.
// MSP code: 101.
// MSP version: 1.
// Description: Provides basic flight controller status including cycle time, errors, sensor status, active modes (first 32), and the current configuration profile.
// Notes: Superseded by `MSP_STATUS_EX` and `MSP2_INAV_STATUS`. `sensorStatus` bitmask: (Bit 0: ACC, 1: BARO, 2: MAG, 3: GPS, 4: RANGEFINDER, 5: OPFLOW, 6: PITOT, 7: TEMP; Bit 15: hardware failure). `activeModesLow` only contains the first 32 modes; use `MSP_ACTIVEBOXES` for the full set.
message MSP_STATUS_Reply {

  // Main loop cycle time (`cycleTime`)
  // Units: µs
  uint32 cycle_time = 1;

  // Number of I2C errors encountered (`i2cGetErrorCounter()`). 0 if `USE_I2C` not defined
  // Units: Count
  uint32 i2c_errors = 2;

  // Bitmask: available/active sensors (`packSensorStatus()`). See notes
  // Units: Bitmask
  // Bitmask field.
  uint32 sensor_status = 3;

  // Bitmask: First 32 bits of the active flight modes bitmask (`packBoxModeFlags()`)
  // Units: Bitmask
  // Bitmask field.
  uint32 active_modes_low = 4;

  // Current configuration profile index (0-based) (`getConfigProfile()`)
  // Units: Index
  uint32 profile = 5;

}

// MSP message `MSP_RAW_IMU` reply payload.
// MSP code: 102.
// MSP version: 1.
// Description: Provides raw sensor readings from the IMU (Accelerometer, Gyroscope, Magnetometer).
// Notes: Acc scaling is approximate (512 LSB/G). Mag units depend on the sensor.
message MSP_RAW_IMU_Reply {

  // Raw accelerometer X reading, scaled (`acc.accADCf[X] * 512`)
  // Units: ~1/512 G
  int32 acc_x = 1;

  // Raw accelerometer Y reading, scaled (`acc.accADCf[Y] * 512`)
  // Units: ~1/512 G
  int32 acc_y = 2;

  // Raw accelerometer Z reading, scaled (`acc.accADCf[Z] * 512`)
  // Units: ~1/512 G
  int32 acc_z = 3;

  // Gyroscope X-axis rate (`gyroRateDps(X)`)
  // Units: deg/s
  int32 gyro_x = 4;

  // Gyroscope Y-axis rate (`gyroRateDps(Y)`)
  // Units: deg/s
  int32 gyro_y = 5;

  // Gyroscope Z-axis rate (`gyroRateDps(Z)`)
  // Units: deg/s
  int32 gyro_z = 6;

  // Raw magnetometer X reading (`mag.magADC[X]`). 0 if `USE_MAG` disabled
  // Units: Raw units
  int32 mag_x = 7;

  // Raw magnetometer Y reading (`mag.magADC[Y]`). 0 if `USE_MAG` disabled
  // Units: Raw units
  int32 mag_y = 8;

  // Raw magnetometer Z reading (`mag.magADC[Z]`). 0 if `USE_MAG` disabled
  // Units: Raw units
  int32 mag_z = 9;

}

// MSP message `MSP_SERVO` reply payload.
// MSP code: 103.
// MSP version: 1.
// Description: Provides the current output values for all supported servos.
// Variable length: True.
message MSP_SERVO_Reply {

  // Array of current servo output values (typically 1000-2000)
  // Units: PWM
  // MSP fixed length: MAX_SUPPORTED_SERVOS.
  repeated int32 servo_outputs = 1;

}

// MSP message `MSP_MOTOR` reply payload.
// MSP code: 104.
// MSP version: 1.
// Description: Provides the current output values for the first 8 motors.
message MSP_MOTOR_Reply {

  // Array of current motor output values (typically 1000-2000). Values beyond `MAX_SUPPORTED_MOTORS` are 0
  // Units: PWM
  // MSP fixed length: 8.
  repeated int32 motor_outputs = 1;

}

// MSP message `MSP_RC` reply payload.
// MSP code: 105.
// MSP version: 1.
// Description: Provides the current values of the received RC channels.
// Notes: Array length equals `rxRuntimeConfig.channelCount`.
// Variable length: True.
message MSP_RC_Reply {

  // Array of current RC channel values (typically 1000-2000). Length depends on detected channels
  // Units: PWM
  // MSP variable-length array.
  repeated int32 rc_channels = 1;

}

// MSP message `MSP_RAW_GPS` reply payload.
// MSP code: 106.
// MSP version: 1.
// Description: Provides raw GPS data (fix status, coordinates, altitude, speed, course).
// Notes: Only available if `USE_GPS` is defined. Altitude is truncated to meters.
message MSP_RAW_GPS_Reply {

  // Enum `gpsFixType_e` GPS fix type (`gpsSol.fixType`)
  // Units: Enum
  gpsFixType_e fix_type = 1;

  // Number of satellites used in solution (`gpsSol.numSat`)
  // Units: Count
  uint32 num_sat = 2;

  // Latitude (`gpsSol.llh.lat`)
  // Units: deg * 1e7
  int32 latitude = 3;

  // Longitude (`gpsSol.llh.lon`)
  // Units: deg * 1e7
  int32 longitude = 4;

  // Altitude above MSL (`gpsSol.llh.alt`) sent as centimeters
  // Units: cm
  int32 altitude = 5;

  // Ground speed (`gpsSol.groundSpeed`)
  // Units: cm/s
  int32 speed = 6;

  // Ground course (`gpsSol.groundCourse`)
  // Units: deci-degrees
  int32 ground_course = 7;

  // Horizontal Dilution of Precision (`gpsSol.hdop`)
  // Units: HDOP * 100
  uint32 hdop = 8;

}

// MSP message `MSP_COMP_GPS` reply payload.
// MSP code: 107.
// MSP version: 1.
// Description: Provides computed GPS values: distance and direction to home.
// Notes: Only available if `USE_GPS` is defined.
message MSP_COMP_GPS_Reply {

  // Distance to the home point (`GPS_distanceToHome`)
  // Units: meters
  uint32 distance_to_home = 1;

  // Direction to the home point (0-360) (`GPS_directionToHome`)
  // Units: degrees
  int32 direction_to_home = 2;

  // Indicates if GPS data is being received (`gpsSol.flags.gpsHeartbeat`)
  // Units: Boolean
  uint32 gps_heartbeat = 3;

}

// MSP message `MSP_ATTITUDE` reply payload.
// MSP code: 108.
// MSP version: 1.
// Description: Provides the current attitude estimate (roll, pitch, yaw).
// Notes: Yaw is in degrees.
message MSP_ATTITUDE_Reply {

  // Roll angle (`attitude.values.roll`)
  // Units: deci-degrees
  int32 roll = 1;

  // Pitch angle (`attitude.values.pitch`)
  // Units: deci-degrees
  int32 pitch = 2;

  // Yaw/Heading angle (`DECIDEGREES_TO_DEGREES(attitude.values.yaw)`)
  // Units: degrees
  int32 yaw = 3;

}

// MSP message `MSP_ALTITUDE` reply payload.
// MSP code: 109.
// MSP version: 1.
// Description: Provides estimated altitude, vertical speed (variometer), and raw barometric altitude.
message MSP_ALTITUDE_Reply {

  // Estimated altitude above home/sea level (`getEstimatedActualPosition(Z)`)
  // Units: cm
  int32 estimated_altitude = 1;

  // Estimated vertical speed (`getEstimatedActualVelocity(Z)`)
  // Units: cm/s
  int32 variometer = 2;

  // Latest raw altitude from barometer (`baroGetLatestAltitude()`). 0 if `USE_BARO` disabled
  // Units: cm
  int32 baro_altitude = 3;

}

// MSP message `MSP_ANALOG` reply payload.
// MSP code: 110.
// MSP version: 1.
// Description: Provides analog sensor readings: battery voltage, current consumption (mAh), RSSI, and current draw (Amps).
// Notes: Superseded by `MSP2_INAV_ANALOG` which provides higher precision and more fields.
message MSP_ANALOG_Reply {

  // Battery voltage, scaled (`getBatteryVoltage() / 10`), constrained 0-255
  // Units: 0.1V
  uint32 vbat = 1;

  // Consumed battery capacity (`getMAhDrawn()`), constrained 0-65535
  // Units: mAh
  uint32 m_ah_drawn = 2;

  // Received Signal Strength Indicator (`getRSSI()`). Units depend on source
  // Units: 0-1023 or %
  uint32 rssi = 3;

  // Current draw (`getAmperage()`), constrained -32768 to 32767
  // Units: 0.01A
  int32 amperage = 4;

}

// MSP message `MSP_RC_TUNING` reply payload.
// MSP code: 111.
// MSP version: 1.
// Description: Retrieves RC tuning parameters (rates, expos, TPA) for the current control rate profile.
// Notes: Superseded by `MSP2_INAV_RATE_PROFILE` which includes manual rates/expos.
message MSP_RC_TUNING_Reply {

  // Always 100 (Legacy, unused)
  // Fixed value in MSP payload: 100.
  uint32 legacy_rc_rate = 1;

  // Roll/Pitch RC Expo (`currentControlRateProfile->stabilized.rcExpo8`)
  uint32 rc_expo = 2;

  // Roll Rate (`currentControlRateProfile->stabilized.rates[FD_ROLL]`)
  uint32 roll_rate = 3;

  // Pitch Rate (`currentControlRateProfile->stabilized.rates[FD_PITCH]`)
  uint32 pitch_rate = 4;

  // Yaw Rate (`currentControlRateProfile->stabilized.rates[FD_YAW]`)
  uint32 yaw_rate = 5;

  // Dynamic Throttle PID (TPA) value (`currentControlRateProfile->throttle.dynPID`)
  uint32 dynamic_throttle_pid = 6;

  // Throttle Midpoint (`currentControlRateProfile->throttle.rcMid8`)
  uint32 throttle_mid = 7;

  // Throttle Expo (`currentControlRateProfile->throttle.rcExpo8`)
  uint32 throttle_expo = 8;

  // Throttle PID Attenuation (TPA) breakpoint (`currentControlRateProfile->throttle.pa_breakpoint`)
  uint32 tpa_breakpoint = 9;

  // Yaw RC Expo (`currentControlRateProfile->stabilized.rcYawExpo8`)
  uint32 rc_yaw_expo = 10;

}

// MSP message `MSP_ACTIVEBOXES` reply payload.
// MSP code: 113.
// MSP version: 1.
// Description: Provides the full bitmask of currently active flight modes (boxes).
// Notes: Use this instead of `MSP_STATUS` or `MSP_STATUS_EX` if more than 32 modes are possible.
message MSP_ACTIVEBOXES_Reply {

  // Bitmask: all active modes (`packBoxModeFlags()`). Size depends on `boxBitmask_t` definition
  // Units: Bitmask
  // Bitmask field.
  // Opaque MSP type `boxBitmask_t` emitted as bytes.
  bytes active_modes = 1;

}

// MSP message `MSP_MISC` reply payload.
// MSP code: 114.
// MSP version: 1.
// Description: Retrieves miscellaneous configuration settings, mostly related to RC, GPS, Mag, and Battery voltage (legacy formats).
// Notes: Superseded by `MSP2_INAV_MISC` and other specific commands which offer better precision and more fields.
message MSP_MISC_Reply {

  // Mid RC value (`PWM_RANGE_MIDDLE`, typically 1500)
  // Units: PWM
  uint32 mid_rc = 1;

  // Always 0 (Legacy)
  // Fixed value in MSP payload: 0.
  uint32 legacy_min_throttle = 2;

  // Maximum throttle command (`getMaxThrottle()`)
  // Units: PWM
  uint32 max_throttle = 3;

  // Minimum motor command when disarmed (`motorConfig()->mincommand`)
  // Units: PWM
  uint32 min_command = 4;

  // Failsafe throttle level (`currentBatteryProfile->failsafe_throttle`)
  // Units: PWM
  uint32 failsafe_throttle = 5;

  // Enum `gpsProvider_e` GPS provider type (`gpsConfig()->provider`). 0 if `USE_GPS` disabled
  // Units: Enum
  gpsProvider_e gps_type = 6;

  // Always 0 (Legacy)
  // Fixed value in MSP payload: 0.
  uint32 legacy_gps_baud = 7;

  // Enum `sbasMode_e` GPS SBAS mode (`gpsConfig()->sbasMode`). 0 if `USE_GPS` disabled
  // Units: Enum
  sbasMode_e gps_sbas_mode = 8;

  // Always 0 (Legacy)
  // Fixed value in MSP payload: 0.
  uint32 legacy_mw_current_out = 9;

  // RSSI channel index (1-based) (`rxConfig()->rssi_channel`)
  // Units: Index
  uint32 rssi_channel = 10;

  // Always 0
  // Fixed value in MSP payload: 0.
  uint32 reserved1 = 11;

  // Magnetic declination / 10 (`compassConfig()->mag_declination / 10`). 0 if `USE_MAG` disabled
  // Units: 0.1 degrees
  uint32 mag_declination = 12;

  // Voltage scale / 10 (`batteryMetersConfig()->voltage.scale / 10`). 0 if `USE_ADC` disabled
  // Units: Scale / 10
  uint32 vbat_scale = 13;

  // Min cell voltage / 10 (`currentBatteryProfile->voltage.cellMin / 10`). 0 if `USE_ADC` disabled
  // Units: 0.1V
  uint32 vbat_min_cell = 14;

  // Max cell voltage / 10 (`currentBatteryProfile->voltage.cellMax / 10`). 0 if `USE_ADC` disabled
  // Units: 0.1V
  uint32 vbat_max_cell = 15;

  // Warning cell voltage / 10 (`currentBatteryProfile->voltage.cellWarning / 10`). 0 if `USE_ADC` disabled
  // Units: 0.1V
  uint32 vbat_warning_cell = 16;

}

// MSP message `MSP_BOXNAMES` reply payload.
// MSP code: 116.
// MSP version: 1.
// Description: Provides a semicolon-separated string containing the names of all available flight modes (boxes).
// Notes: The exact set of names depends on compiled features and configuration. Due to the size of the payload, it is recommended that [`MSP_BOXIDS`](#msp_boxids-119--0x77) is used instead.
// Variable length: True.
message MSP_BOXNAMES_Reply {

  // String containing mode names separated by ';'. Null termination not guaranteed by MSP, relies on payload size. (`serializeBoxNamesReply()`)
  // MSP variable-length array.
  string box_names_string = 1;

}

// MSP message `MSP_PIDNAMES` reply payload.
// MSP code: 117.
// MSP version: 1.
// Description: Provides a semicolon-separated string containing the names of the PID controllers.
// Variable length: True.
message MSP_PIDNAMES_Reply {

  // String "ROLL;PITCH;YAW;ALT;Pos;PosR;NavR;LEVEL;MAG;VEL;". Null termination not guaranteed by MSP
  // MSP variable-length array.
  string pid_names_string = 1;

}

// MSP message `MSP_WP` request payload.
// MSP code: 118.
// MSP version: 1.
// Description: Get/Set a single waypoint from the mission plan.
// Notes: See `navWaypoint_t` and `navWaypointActions_e`.
message MSP_WP_Request {

  // Index of the waypoint to retrieve (0 to `NAV_MAX_WAYPOINTS - 1`)
  uint32 waypoint_index = 1;

}

// MSP message `MSP_WP` reply payload.
// MSP code: 118.
// MSP version: 1.
// Description: Get/Set a single waypoint from the mission plan.
// Notes: See `navWaypoint_t` and `navWaypointActions_e`.
message MSP_WP_Reply {

  // Index of the returned waypoint
  // Units: Index
  uint32 waypoint_index = 1;

  // Enum `navWaypointActions_e` Waypoint action type
  // Units: Enum
  navWaypointActions_e action = 2;

  // Latitude coordinate
  // Units: deg * 1e7
  int32 latitude = 3;

  // Longitude coordinate
  // Units: deg * 1e7
  int32 longitude = 4;

  // Altitude coordinate (relative to home or sea level, see flag)
  // Units: cm
  int32 altitude = 5;

  // Parameter 1 (meaning depends on action)
  // Units: Varies
  int32 param1 = 6;

  // Parameter 2 (meaning depends on action)
  // Units: Varies
  int32 param2 = 7;

  // Parameter 3 (meaning depends on action)
  // Units: Varies
  int32 param3 = 8;

  // Bitmask: Waypoint flags (`NAV_WP_FLAG_*`)
  // Units: Bitmask
  // Bitmask field.
  uint32 flag = 9;

}

// MSP message `MSP_BOXIDS` reply payload.
// MSP code: 119.
// MSP version: 1.
// Description: Provides a list of permanent IDs associated with the available flight modes (boxes).
// Notes: Useful for mapping mode range configurations (`MSP_MODE_RANGES`) back to user-understandable modes via `MSP_BOXNAMES`.
// Variable length: True.
message MSP_BOXIDS_Reply {

  // Array of permanent IDs for each configured box (`serializeBoxReply()`). Length depends on number of boxes
  // MSP variable-length array.
  bytes box_ids = 1;

}

// MSP message `MSP_SERVO_CONFIGURATIONS` reply payload.
// MSP code: 120.
// MSP version: 1.
// Description: Retrieves the configuration parameters for all supported servos (min, max, middle, rate). Legacy format with unused fields.
// Notes: Superseded by `MSP2_INAV_SERVO_CONFIG` which has a cleaner structure.
// Variable length: MAX_SUPPORTED_SERVOS.
message MSP_SERVO_CONFIGURATIONS_Reply {

  // Minimum servo endpoint (`servoParams(i)->min`)
  // Units: PWM
  int32 min = 1;

  // Maximum servo endpoint (`servoParams(i)->max`)
  // Units: PWM
  int32 max_field = 2;

  // Middle/Neutral servo position (`servoParams(i)->middle`)
  // Units: PWM
  int32 middle = 3;

  // Servo rate/scaling (`servoParams(i)->rate`, -125..125). Encoded as two's complement
  // Units: % (-100 to 100)
  int32 rate = 4;

  // Always 0
  // Fixed value in MSP payload: 0.
  uint32 reserved1 = 5;

  // Always 0
  // Fixed value in MSP payload: 0.
  uint32 reserved2 = 6;

  // Always 255 (Legacy)
  // Fixed value in MSP payload: 255.
  uint32 legacy_forward_chan = 7;

  // Always 0 (Legacy)
  // Fixed value in MSP payload: 0.
  uint32 legacy_reversed_sources = 8;

}

// MSP message `MSP_NAV_STATUS` reply payload.
// MSP code: 121.
// MSP version: 1.
// Description: Retrieves the current status of the navigation system.
// Notes: Requires `USE_GPS`.
message MSP_NAV_STATUS_Reply {

