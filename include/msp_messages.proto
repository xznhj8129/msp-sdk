  // Delay before failsafe stage 1 activates (`failsafeConfig()->failsafe_delay`)
  // Units: 0.1s
  uint32 failsafe_delay = 1;

  // Delay after signal recovery before returning control (`failsafeConfig()->failsafe_off_delay`)
  // Units: 0.1s
  uint32 failsafe_off_delay = 2;

  // Throttle level during failsafe stage 2 (`currentBatteryProfile->failsafe_throttle`)
  // Units: PWM
  uint32 failsafe_throttle = 3;

  // Legacy flag, always 0
  // Fixed value in MSP payload: 0.
  uint32 legacy_kill_switch = 4;

  // Delay for throttle-based failsafe detection (`failsafeConfig()->failsafe_throttle_low_delay`). Units of 0.1 seconds.
  // Units: 0.1s
  uint32 failsafe_throttle_low_delay = 5;

  // Enum `failsafeProcedure_e` Failsafe procedure (Drop, RTH, Land, etc.) ('failsafeConfig()->failsafe_procedure')
  // Units: Enum
  failsafeProcedure_e failsafe_procedure = 6;

  // Delay after RTH finishes before attempting recovery (`failsafeConfig()->failsafe_recovery_delay`)
  // Units: 0.1s
  uint32 failsafe_recovery_delay = 7;

  // Fixed-wing failsafe roll angle (`failsafeConfig()->failsafe_fw_roll_angle`). Signed deci-degrees.
  // Units: deci-degrees
  int32 failsafe_fwroll_angle = 8;

  // Fixed-wing failsafe pitch angle (`failsafeConfig()->failsafe_fw_pitch_angle`). Signed deci-degrees.
  // Units: deci-degrees
  int32 failsafe_fwpitch_angle = 9;

  // Fixed-wing failsafe yaw rate (`failsafeConfig()->failsafe_fw_yaw_rate`). Signed degrees per second.
  // Units: deg/s
  int32 failsafe_fwyaw_rate = 10;

  // Stick movement threshold to exit failsafe (`failsafeConfig()->failsafe_stick_motion_threshold`)
  // Units: PWM units
  uint32 failsafe_stick_threshold = 11;

  // Minimum distance from home for RTH failsafe (`failsafeConfig()->failsafe_min_distance`). Units of centimeters.
  // Units: cm
  uint32 failsafe_min_distance = 12;

  // Enum `failsafeProcedure_e` Failsafe procedure if below min distance ('failsafeConfig()->failsafe_min_distance_procedure')
  // Units: Enum
  failsafeProcedure_e failsafe_min_distance_proc = 13;

}

// MSP message `MSP_SET_FAILSAFE_CONFIG` request payload.
// MSP code: 76.
