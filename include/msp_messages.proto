  // Voltage scale (`batteryMetersConfig()->voltage.scale`). 0 if `USE_ADC` disabled
  // Units: Scale
  uint32 vbat_scale = 11;

  // Enum `batVoltageSource_e` Voltage source (`batteryMetersConfig()->voltageSource`). 0 if `USE_ADC` disabled
  // Units: Enum
  batVoltageSource_e vbat_source = 12;

  // Configured cell count (`currentBatteryProfile->cells`). 0 if `USE_ADC` disabled
  // Units: Count
  uint32 cell_count = 13;

  // Cell detection voltage (`currentBatteryProfile->voltage.cellDetect`). 0 if `USE_ADC` disabled
  // Units: 0.01V
  uint32 vbat_cell_detect = 14;

  // Min cell voltage (`currentBatteryProfile->voltage.cellMin`). 0 if `USE_ADC` disabled
  // Units: 0.01V
  uint32 vbat_min_cell = 15;

  // Max cell voltage (`currentBatteryProfile->voltage.cellMax`). 0 if `USE_ADC` disabled
  // Units: 0.01V
  uint32 vbat_max_cell = 16;

  // Warning cell voltage (`currentBatteryProfile->voltage.cellWarning`). 0 if `USE_ADC` disabled
