message MSP2_INAV_MISC2_Reply {

  // Time since boot (`micros() / 1000000`)
  // Units: Seconds
  uint32 uptime_seconds = 1;

  // Accumulated flight time (`getFlightTime()`)
  // Units: Seconds
  uint32 flight_time_seconds = 2;

  // Current throttle output percentage (`getThrottlePercent(true)`)
