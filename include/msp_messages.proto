// MSP message `MSP2_INAV_EZ_TUNE` reply payload.
// MSP code: 8304.
// MSP version: 2.
// Description: Retrieves the current EZ-Tune parameters.
// Notes: Requires `USE_EZ_TUNE`. Calls `ezTuneUpdate()` before sending.
message MSP2_INAV_EZ_TUNE_Reply {

  // Boolean: 1 if EZ-Tune is enabled (`ezTune()->enabled`)
  uint32 enabled = 1;

  // Filter frequency used during tuning (`ezTune()->filterHz`)
  uint32 filter_hz = 2;

  // Roll vs Pitch axis tuning ratio (`ezTune()->axisRatio`)
  uint32 axis_ratio = 3;

  // Desired response characteristic (`ezTune()->response`)
  uint32 response = 4;

  // Desired damping characteristic (`ezTune()->damping`)
  uint32 damping = 5;

  // Stability preference (`ezTune()->stability`)
  uint32 stability = 6;

  // Aggressiveness preference (`ezTune()->aggressiveness`)
  uint32 aggressiveness = 7;

  // Resulting rate setting (`ezTune()->rate`)
  uint32 rate = 8;

  // Resulting expo setting (`ezTune()->expo`)
  uint32 expo = 9;

  // Snappiness preference (`ezTune()->snappiness`)
