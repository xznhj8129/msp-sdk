// MSP message `MSP2_INAV_OUTPUT_MAPPING_EXT` reply payload.
// MSP code: 8205.
// MSP version: 2.
// Description: Retrieves extended output mapping configuration (timer ID and usage flags). Obsolete, use `MSP2_INAV_OUTPUT_MAPPING_EXT2`.
// Notes: Usage flags are truncated to 8 bits. `timerId` mapping is target-specific.
// Variable length: for each Motor/Servo timer.
message MSP2_INAV_OUTPUT_MAPPING_EXT_Reply {

  // Hardware timer identifier (e.g., `TIM1`, `TIM2`). Value depends on target
  uint32 timer_id = 1;

  // Timer usage flags (lower 8 bits of `timerHardware[i].usageFlags`, e.g. `TIM_USE_MOTOR`, `TIM_USE_SERVO`)
  uint32 usage_flags = 2;

}

// MSP message `MSP2_INAV_TIMER_OUTPUT_MODE` request payload.
// MSP code: 8206.
// MSP version: 2.
// Description: Reads timer output mode overrides.
// Notes: Non-SITL only. HARDWARE_TIMER_DEFINITION_COUNT is target specific. Returns MSP_RESULT_ACK on success, MSP_RESULT_ERROR on invalid timer index.
// Variable length: True.
// 1 schema variants selected by MSP payload shape.
message MSP2_INAV_TIMER_OUTPUT_MODE_Request {

  // Variant condition: dataSize == 1
  message Variant1 {

    // 0..HARDWARE_TIMER_DEFINITION_COUNT-1
    uint32 timer_index = 1;

  }

  oneof variant {
    // dataSize == 1
    Variant1 variant_1 = 1;
  }
}

// MSP message `MSP2_INAV_TIMER_OUTPUT_MODE` reply payload.
// MSP code: 8206.
// MSP version: 2.
// Description: Reads timer output mode overrides.
// Notes: Non-SITL only. HARDWARE_TIMER_DEFINITION_COUNT is target specific. Returns MSP_RESULT_ACK on success, MSP_RESULT_ERROR on invalid timer index.
// Variable length: True.
// 2 schema variants selected by MSP payload shape.
message MSP2_INAV_TIMER_OUTPUT_MODE_Reply {

  // Variant condition: dataSize == 0
  message Variant1 {

    // Timer index
    uint32 timer_index = 1;

    // OUTPUT_MODE_*
    outputMode_e output_mode = 2;

  }

  // Variant condition: dataSize == 1
  message Variant2 {

    // Echoed timer index
    uint32 timer_index = 1;

    // OUTPUT_MODE_*
    outputMode_e output_mode = 2;

  }

  oneof variant {
    // dataSize == 0
    Variant1 variant_1 = 1;
    // dataSize == 1
    Variant2 variant_2 = 2;
  }
}

// MSP message `MSP2_INAV_SET_TIMER_OUTPUT_MODE` request payload.
// MSP code: 8207.
// MSP version: 2.
// Description: Set the output mode override for a specific hardware timer.
// Notes: Only available on non-SITL builds. Expects 2 bytes. Returns error if `timerIndex` is invalid.
message MSP2_INAV_SET_TIMER_OUTPUT_MODE_Request {

  // Index of the hardware timer definition
  uint32 timer_index = 1;

  // Output mode override (`outputMode_e` enum) to set
  outputMode_e output_mode = 2;

}

// MSP message `MSP2_INAV_MIXER` reply payload.
// MSP code: 8208.
// MSP version: 2.
// Description: Retrieves INAV-specific mixer configuration details.
message MSP2_INAV_MIXER_Reply {

  // Boolean: 1 if motor direction is reversed globally (`mixerConfig()->motorDirectionInverted`)
  uint32 motor_direction_inverted = 1;

  // Always 0 (Was yaw jump prevention limit)
  // Fixed value in MSP payload: 0.
  uint32 reserved1 = 2;

  // Boolean: 1 if motors stop at minimum throttle (`mixerConfig()->motorstopOnLow`)
  uint32 motor_stop_on_low = 3;

  // Enum (`mixerConfig()->platformType`)
  flyingPlatformType_e platform_type = 4;

  // Boolean: 1 if the current mixer configuration includes flaps (`mixerConfig()->hasFlaps`)
  uint32 has_flaps = 5;

  // Enum (`mixerPreset_e`): Mixer preset currently applied (`mixerConfig()->appliedMixerPreset`) WARNING: cannot figure where this is
  // Enum `mixerPreset_e` referenced in msp_messages.json but missing from inav_enums.json; emitted as `int32`.
  int32 applied_mixer_preset = 6;

  // Constant: Maximum motors supported (`MAX_SUPPORTED_MOTORS`)
  uint32 max_motors = 7;

  // Constant: Maximum servos supported (`MAX_SUPPORTED_SERVOS`)
  uint32 max_servos = 8;

}

// MSP message `MSP2_INAV_SET_MIXER` request payload.
// MSP code: 8209.
// MSP version: 2.
// Description: Sets INAV-specific mixer configuration details.
// Notes: Expects 9 bytes. Calls `mixerUpdateStateFlags()`.
message MSP2_INAV_SET_MIXER_Request {

  // Sets `mixerConfigMutable()->motorDirectionInverted`
  uint32 motor_direction_inverted = 1;

  // Ignored
  uint32 reserved1 = 2;

  // Sets `mixerConfigMutable()->motorstopOnLow`
  uint32 motor_stop_on_low = 3;

  // Sets `mixerConfigMutable()->platformType`
  flyingPlatformType_e platform_type = 4;

  // Sets `mixerConfigMutable()->hasFlaps`
  uint32 has_flaps = 5;

  // Sets `mixerConfigMutable()->appliedMixerPreset`
  int32 applied_mixer_preset = 6;

  // Ignored
  uint32 max_motors = 7;

  // Ignored
  uint32 max_servos = 8;

}

// MSP message `MSP2_INAV_OSD_LAYOUTS` request payload.
// MSP code: 8210.
// MSP version: 2.
// Description: Retrieves OSD layout metadata or item positions for specific layouts/items.
// Notes: Requires `USE_OSD`. Returns `MSP_RESULT_ACK` on success, `MSP_RESULT_ERROR` if indexes are out of range.
// 2 schema variants selected by MSP payload shape.
message MSP2_INAV_OSD_LAYOUTS_Request {

  // Variant condition: dataSize == 1
  message Variant1 {

    // Layout index (0 to `OSD_LAYOUT_COUNT - 1`)
    uint32 layout_index = 1;

  }

  // Variant condition: dataSize == 3
  message Variant2 {

    // Layout index (0 to `OSD_LAYOUT_COUNT - 1`)
    uint32 layout_index = 1;

    // OSD item index (0 to `OSD_ITEM_COUNT - 1`)
    uint32 item_index = 2;

  }

  oneof variant {
    // dataSize == 1
    Variant1 variant_1 = 1;
    // dataSize == 3
    Variant2 variant_2 = 2;
  }
}

// MSP message `MSP2_INAV_OSD_LAYOUTS` reply payload.
// MSP code: 8210.
// MSP version: 2.
// Description: Retrieves OSD layout metadata or item positions for specific layouts/items.
// Notes: Requires `USE_OSD`. Returns `MSP_RESULT_ACK` on success, `MSP_RESULT_ERROR` if indexes are out of range.
// 3 schema variants selected by MSP payload shape.
message MSP2_INAV_OSD_LAYOUTS_Reply {

  // Variant condition: dataSize == 0
  message Variant1 {

    // Number of OSD layouts (`OSD_LAYOUT_COUNT`)
    uint32 layout_count = 1;

    // Number of OSD items per layout (`OSD_ITEM_COUNT`)
    uint32 item_count = 2;

  }

  // Variant condition: dataSize == 1
  message Variant2 {

    // Packed X/Y position (`osdLayoutsConfig()->item_pos[layoutIndex][item]`)
    // Units: packed coords
    uint32 item_position = 1;

  }

  // Variant condition: dataSize == 3
  message Variant3 {

    // Packed X/Y position (`osdLayoutsConfig()->item_pos[layoutIndex][itemIndex]`)
    // Units: packed coords
    uint32 item_position = 1;

  }

  oneof variant {
    // dataSize == 0
    Variant1 variant_1 = 1;
    // dataSize == 1
    Variant2 variant_2 = 2;
    // dataSize == 3
    Variant3 variant_3 = 3;
  }
}

// MSP message `MSP2_INAV_OSD_SET_LAYOUT_ITEM` request payload.
// MSP code: 8211.
// MSP version: 2.
// Description: Sets the position of a single OSD item within a specific layout.
// Notes: Requires `USE_OSD`. Expects 4 bytes. Returns error if indexes are invalid. If the modified layout is not the currently active one, it temporarily overrides the active layout for 10 seconds to show the change. Otherwise, triggers a full OSD redraw.
message MSP2_INAV_OSD_SET_LAYOUT_ITEM_Request {

  // Index of the OSD layout (0 to `OSD_LAYOUT_COUNT - 1`)
  // Units: Index
  uint32 layout_index = 1;

  // Index of the OSD item
  // Units: Index
  uint32 item_index = 2;

  // Packed X/Y position using `OSD_POS(x, y)` with `OSD_VISIBLE_FLAG` bit
  // Units: Coordinates
  uint32 item_position = 3;

}

// MSP message `MSP2_INAV_OSD_ALARMS` reply payload.
// MSP code: 8212.
// MSP version: 2.
// Description: Retrieves OSD alarm threshold settings.
// Notes: Requires `USE_OSD`.
message MSP2_INAV_OSD_ALARMS_Reply {

  // RSSI alarm threshold (`osdConfig()->rssi_alarm`)
  // Units: %
  uint32 rssi_alarm = 1;

  // Timer alarm threshold (`osdConfig()->time_alarm`)
  // Units: seconds
  uint32 timer_alarm = 2;

  // Altitude alarm threshold (`osdConfig()->alt_alarm`)
  // Units: meters
  uint32 alt_alarm = 3;

  // Distance alarm threshold (`osdConfig()->dist_alarm`)
  // Units: meters
  uint32 dist_alarm = 4;

  // Negative altitude alarm threshold (`osdConfig()->neg_alt_alarm`)
  // Units: meters
  uint32 neg_alt_alarm = 5;

  // G-force alarm threshold (`osdConfig()->gforce_alarm * 1000`)
  // Units: G * 1000
  uint32 g_force_alarm = 6;

  // Min G-force per-axis alarm (`osdConfig()->gforce_axis_alarm_min * 1000`)
  // Units: G * 1000
  int32 g_force_axis_min_alarm = 7;

  // Max G-force per-axis alarm (`osdConfig()->gforce_axis_alarm_max * 1000`)
  // Units: G * 1000
  int32 g_force_axis_max_alarm = 8;

  // Current draw alarm threshold (`osdConfig()->current_alarm`)
  // Units: A
  uint32 current_alarm = 9;

  // Min IMU temperature alarm (`osdConfig()->imu_temp_alarm_min`)
  // Units: degrees C
  int32 imu_temp_min_alarm = 10;

  // Max IMU temperature alarm (`osdConfig()->imu_temp_alarm_max`)
  // Units: degrees C
  int32 imu_temp_max_alarm = 11;

  // Min Baro temperature alarm (`osdConfig()->baro_temp_alarm_min`). 0 if `USE_BARO` disabled
  // Units: degrees C
  int32 baro_temp_min_alarm = 12;

  // Max Baro temperature alarm (`osdConfig()->baro_temp_alarm_max`). 0 if `USE_BARO` disabled
  // Units: degrees C
  int32 baro_temp_max_alarm = 13;

  // ADSB warning distance (`osdConfig()->adsb_distance_warning`). 0 if `USE_ADSB` disabled
  // Units: meters
  uint32 adsb_warn_distance = 14;

  // ADSB alert distance (`osdConfig()->adsb_distance_alert`). 0 if `USE_ADSB` disabled
  // Units: meters
  uint32 adsb_alert_distance = 15;

}

