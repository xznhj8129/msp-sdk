  uint32 braking_boost_factor = 4;

  // Timeout for the boost factor (`navConfig()->mc.braking_boost_timeout`)
  // Units: ms
  uint32 braking_boost_timeout = 5;

  // Speed threshold for boost engagement (`navConfig()->mc.braking_boost_speed_threshold`)
  // Units: cm/s
  uint32 braking_boost_speed_threshold = 6;

  // Speed threshold for boost disengagement (`navConfig()->mc.braking_boost_disengage_speed`)
  // Units: cm/s
  uint32 braking_boost_disengage_speed = 7;

  // Maximum bank angle allowed during braking (`navConfig()->mc.braking_bank_angle`)
  // Units: degrees
  uint32 braking_bank_angle = 8;

}

