  // Ignored. (Size >= 9)
  uint32 legacy_gyro_notch_cutoff = 5;

  // Ignored. (Size >= 13)
  uint32 bf_compat_dterm_notch_hz = 6;

  // Ignored. (Size >= 13)
  uint32 bf_compat_dterm_notch_cutoff = 7;

  // Ignored. (Size >= 17)
  uint32 bf_compat_gyro_notch2_hz = 8;

  // Ignored. (Size >= 17)
  uint32 bf_compat_gyro_notch2_cutoff = 9;

  // Sets `accelerometerConfigMutable()->acc_notch_hz` (constrained 0-255). (Size >= 21)
  // Units: Hz
  uint32 acc_notch_hz = 10;

  // Sets `accelerometerConfigMutable()->acc_notch_cutoff` (constrained 1-255). (Size >= 21)
  // Units: Hz
  uint32 acc_notch_cutoff = 11;

  // Ignored. (Size >= 22)
  uint32 legacy_gyro_stage2_lpf_hz = 12;

}

