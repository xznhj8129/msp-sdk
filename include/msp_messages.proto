// MSP message `MSP_RTH_AND_LAND_CONFIG` reply payload.
// MSP code: 21.
// MSP version: 1.
// Description: Retrieves configuration parameters related to Return-to-Home (RTH) and automatic landing behaviors.
message MSP_RTH_AND_LAND_CONFIG_Reply {

  // Minimum distance from home required for RTH to engage (`navConfig()->general.min_rth_distance`)
  // Units: cm
  uint32 min_rth_distance = 1;

  // Flag: Climb to RTH altitude before returning (`navConfig()->general.flags.rth_climb_first`)
  // Units: Boolean
  uint32 rth_climb_first = 2;

  // Flag: Climb even in emergency RTH (`navConfig()->general.flags.rth_climb_ignore_emerg`)
  // Units: Boolean
  uint32 rth_climb_ignore_emerg = 3;

  // Flag: Return tail-first during RTH (`navConfig()->general.flags.rth_tail_first`)
  // Units: Boolean
  uint32 rth_tail_first = 4;

  // Flag: Allow automatic landing after RTH (`navConfig()->general.flags.rth_allow_landing`)
  // Units: Boolean
  uint32 rth_allow_landing = 5;

  // RTH altitude control mode (`navConfig()->general.flags.rth_alt_control_mode`). WARNING: uses unnamed enum in navigation.h:253 'NAV_RTH_NO_ALT...'
  // Units: Enum
  // Enum `navRthAltControlMode_e` referenced in msp_messages.json but missing from inav_enums.json; emitted as `uint32`.
  uint32 rth_alt_control_mode = 6;

  // Distance increase threshold to abort RTH (`navConfig()->general.rth_abort_threshold`)
  // Units: cm
  uint32 rth_abort_threshold = 7;

  // Target RTH altitude (`navConfig()->general.rth_altitude`)
  // Units: cm
  uint32 rth_altitude = 8;

  // Landing vertical speed at minimum slowdown altitude (`navConfig()->general.land_minalt_vspd`)
  // Units: cm/s
  uint32 land_min_alt_vspd = 9;

  // Landing vertical speed at maximum slowdown altitude (`navConfig()->general.land_maxalt_vspd`)
  // Units: cm/s
  uint32 land_max_alt_vspd = 10;

  // Altitude below which `landMinAltVspd` applies (`navConfig()->general.land_slowdown_minalt`)
  // Units: cm
  uint32 land_slowdown_min_alt = 11;

  // Altitude above which `landMaxAltVspd` applies (`navConfig()->general.land_slowdown_maxalt`)
  // Units: cm
  uint32 land_slowdown_max_alt = 12;

  // Vertical speed during emergency landing descent (`navConfig()->general.emerg_descent_rate`)
  // Units: cm/s
  uint32 emerg_descent_rate = 13;

}

