message MSP_GPSSVINFO_Reply {

  // Always 1 (Stub version)
  // Fixed value in MSP payload: 1.
  uint32 protocol_version = 1;

  // Always 0 (Number of SV info channels reported)
  // Fixed value in MSP payload: 0.
  uint32 num_channels = 2;

  // Hundreds digit of HDOP (stub always writes 0)
  uint32 hdop_hundreds_digit = 3;

  // Tens digit of HDOP (`gpsSol.hdop / 100`, truncated)
