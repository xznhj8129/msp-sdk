  // Units: 0.1s
  uint32 failsafe_recovery_delay = 7;

  // Sets `failsafeConfigMutable()->failsafe_fw_roll_angle`. Signed deci-degrees.
  // Units: deci-degrees
  int32 failsafe_fwroll_angle = 8;

