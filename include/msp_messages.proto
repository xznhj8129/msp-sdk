  uint32 blackbox_rate_denom = 4;

  // Bitmask: Flags for fields included/excluded from logging (`blackboxConfig()->includeFlags`)
  // Bitmask field.
  uint32 blackbox_include_flags = 5;

}

// MSP message `MSP2_SET_BLACKBOX_CONFIG` request payload.
