  // Sets `navConfigMutable()->general.max_manual_speed`.
  // Units: cm/s
  uint32 max_manual_speed = 4;

  // Sets `navConfigMutable()->fw.max_manual_climb_rate` or `navConfigMutable()->mc.max_manual_climb_rate`.
  // Units: cm/s
  uint32 max_manual_climb_rate = 5;

