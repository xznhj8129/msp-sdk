    in: null
    out:
      min: int16_t(PWM) # Minimum servo endpoint (`servoParams(i)->min`)
      max: int16_t(PWM) # Maximum servo endpoint (`servoParams(i)->max`)
      middle: int16_t(PWM) # Middle/Neutral servo position (`servoParams(i)->middle`)
      rate: int8_t(% (-125 to 125)) # Servo rate/scaling (`servoParams(i)->rate`)

  MSP2_INAV_SET_SERVO_CONFIG:
    in:
      servoIndex: uint8_t(Index) # Index of the servo to configure (0 to `MAX_SUPPORTED_SERVOS - 1`)
      min: int16_t(PWM) # Sets minimum servo endpoint
      max: int16_t(PWM) # Sets maximum servo endpoint
      middle: int16_t(PWM) # Sets middle/neutral servo position
      rate: int8_t(% (-125 to 125)) # Sets servo rate/scaling
    out: null

  MSP2_INAV_GEOZONE:
    in:
      geozoneIndex: uint8_t # Index of the geozone (0 to `MAX_GEOZONES_IN_CONFIG - 1`)
    out:
      geozoneIndex: uint8_t # Index requested
      type: uint8_t # Define (`GEOZONE_TYPE_EXCLUSIVE/INCLUSIVE`): Zone type (Inclusion/Exclusion)
      shape: uint8_t # Define (`GEOZONE_SHAPE_CIRCULAR/POLYGON`): Zone shape (Polygon/Circular)
      minAltitude: int32_t(cm) # Minimum allowed altitude within the zone (`geoZonesConfig(idx)->minAltitude`)
      maxAltitude: int32_t(cm) # Maximum allowed altitude within the zone (`geoZonesConfig(idx)->maxAltitude`)
      isSeaLevelRef: uint8_t # Boolean: 1 if altitudes are relative to sea level, 0 if relative to home
      fenceAction: enum.fenceAction_e # Enum (`fenceAction_e`): Action to take upon boundary violation
      vertexCount: uint8_t # Number of vertices defined for this zone

  MSP2_INAV_SET_GEOZONE:
    in:
      geozoneIndex: uint8_t # Index of the geozone (0 to `MAX_GEOZONES_IN_CONFIG - 1`)
      type: uint8_t # Define (`GEOZONE_TYPE_EXCLUSIVE/INCLUSIVE`): Zone type (Inclusion/Exclusion)
      shape: uint8_t # Define (`GEOZONE_SHAPE_CIRCULAR/POLYGON`): Zone shape (Polygon/Circular)
      minAltitude: int32_t(cm) # Minimum allowed altitude (`geoZonesConfigMutable()->minAltitude`)
      maxAltitude: int32_t(cm) # Maximum allowed altitude (`geoZonesConfigMutable()->maxAltitude`)
      isSeaLevelRef: uint8_t # Boolean: Altitude reference
      fenceAction: enum.fenceAction_e # Enum (`fenceAction_e`): Action to take upon boundary violation
      vertexCount: uint8_t # Number of vertices to be defined (used for validation later)
    out: null

  MSP2_INAV_GEOZONE_VERTEX:
    in:
