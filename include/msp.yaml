    in: null
    out:
      timerId: uint8_t # Hardware timer identifier (e.g., `TIM1`, `TIM2`). SITL uses index
      usageFlags: uint32_t # Full 32-bit timer usage flags (`TIM_USE_*`)
      pinLabel: enum.PIN_LABEL # Label for special pin usage (`PIN_LABEL_*` enum, e.g., `PIN_LABEL_LED`). 0 (`PIN_LABEL_NONE`) otherwise

