messages:
  MSP_API_VERSION:
    in: null
    out:
      mspProtocolVersion: uint8_t # MSP Protocol version (`MSP_PROTOCOL_VERSION`, typically 0)
      apiVersionMajor: uint8_t # INAV API Major version (`API_VERSION_MAJOR`)
      apiVersionMinor: uint8_t # INAV API Minor version (`API_VERSION_MINOR`)

  MSP_FC_VARIANT:
    in: null
    out:
      fcVariantIdentifier: char[4] # 4-character identifier string (e.g., "INAV"). Defined by `flightControllerIdentifier`.

  MSP_FC_VERSION:
    in: null
    out:
      fcVersionMajor: uint8_t # Firmware Major version (`FC_VERSION_MAJOR`)
      fcVersionMinor: uint8_t # Firmware Minor version (`FC_VERSION_MINOR`)
      fcVersionPatch: uint8_t # Firmware Patch level (`FC_VERSION_PATCH_LEVEL`)

  MSP_BOARD_INFO:
    in: null
    out:
      boardIdentifier: char[4] # 4-character UPPER CASE board identifier (`TARGET_BOARD_IDENTIFIER`)
      hardwareRevision: uint16_t # Hardware revision number. 0 if not detected (`USE_HARDWARE_REVISION_DETECTION`)
      osdSupport: uint8_t # OSD chip type: 0=None, 2=Onboard (`USE_OSD`). INAV does not support slave OSD (1)
      commCapabilities: uint8_t(Bitmask) # Bitmask: Communication capabilities: Bit 0=VCP support (`USE_VCP`), Bit 1=SoftSerial support (`USE_SOFTSERIAL1`/`2`)
      targetNameLength: uint8_t # Length of the target name string that follows
      targetName: char[] # Target name string (e.g., "MATEKF405"). Length given by previous field

  MSP_BUILD_INFO:
    in: null
    out:
      buildDate: char[11] # Build date string (e.g., "Dec 31 2023"). `BUILD_DATE_LENGTH`.
      buildTime: char[8] # Build time string (e.g., "23:59:59"). `BUILD_TIME_LENGTH`.
      gitRevision: char[8] # Short Git revision string. `GIT_SHORT_REVISION_LENGTH`.

  MSP_INAV_PID:
    in: null
    out:
      legacyAsyncProcessing: uint8_t # Legacy, unused. Always 0
      legacyAsyncValue1: uint16_t # Legacy, unused. Always 0
      legacyAsyncValue2: int16_t # Legacy, unused. Always 0
      headingHoldRateLimit: uint8_t(deg/s) # Max rate for heading hold P term (`pidProfile()->heading_hold_rate_limit`)
      headingHoldLpfFreq: uint8_t(Hz) # Fixed LPF frequency for heading hold error (`HEADING_HOLD_ERROR_LPF_FREQ`)
      legacyYawJumpLimit: int16_t # Legacy, unused. Always 0
      legacyGyroLpf: uint8_t(Hz) # Fixed value `GYRO_LPF_256HZ`
      accLpfHz: uint8_t(Hz) # Accelerometer LPF frequency (`accelerometerConfig()->acc_lpf_hz`) cutoff frequency for the low pass filter used on the acc z-axis for althold in Hz
      reserved1: uint8_t # Reserved. Always 0
      reserved2: uint8_t # Reserved. Always 0
      reserved3: uint8_t # Reserved. Always 0
      reserved4: uint8_t # Reserved. Always 0

  MSP_SET_INAV_PID:
    in:
      legacyAsyncProcessing: uint8_t # Legacy, ignored
      legacyAsyncValue1: int16_t # Legacy, ignored
      legacyAsyncValue2: int16_t # Legacy, ignored
      headingHoldRateLimit: uint8_t(deg/s) # Sets `pidProfileMutable()->heading_hold_rate_limit`.
      headingHoldLpfFreq: uint8_t(Hz) # Ignored (fixed value `HEADING_HOLD_ERROR_LPF_FREQ` used)
      legacyYawJumpLimit: int16_t # Legacy, ignored
      legacyGyroLpf: uint8_t # Ignored (historically mapped to `gyro_lpf_e` values).
      accLpfHz: uint8_t(Hz) # Sets `accelerometerConfigMutable()->acc_lpf_hz`.
      reserved1: uint8_t # Ignored
      reserved2: uint8_t # Ignored
      reserved3: uint8_t # Ignored
      reserved4: uint8_t # Ignored
    out: null

  MSP_NAME:
    in: null
    out:
      craftName: char[] # The craft name string (`systemConfig()->craftName`). Null termination is *not* explicitly sent, the length is determined by the payload size

  MSP_SET_NAME:
    in:
      craftName: char[] # The new craft name string. Automatically null-terminated by the FC
    out: null

  MSP_NAV_POSHOLD:
    in: null
    out:
      userControlMode: uint8_t # Navigation user control mode NAV_GPS_ATTI (0) or NAV_GPS_CRUISE (1)
      maxAutoSpeed: uint16_t(cm/s) # Max speed in autonomous modes (`navConfig()->general.max_auto_speed`)
      maxAutoClimbRate: uint16_t(cm/s) # Max climb rate in autonomous modes (uses `fw.max_auto_climb_rate` or `mc.max_auto_climb_rate` based on platform)
      maxManualSpeed: uint16_t(cm/s) # Max speed in manual modes with GPS aiding (`navConfig()->general.max_manual_speed`)
      maxManualClimbRate: uint16_t(cm/s) # Max climb rate in manual modes with GPS aiding (uses `fw.max_manual_climb_rate` or `mc.max_manual_climb_rate`)
      mcMaxBankAngle: uint8_t(degrees) # Max bank angle for multirotor position hold (`navConfig()->mc.max_bank_angle`)
      mcAltHoldThrottleType: enum.MC_ALT_HOLD # Enum `navMcAltHoldThrottle_e` mirrored from `navConfig()->mc.althold_throttle_type`.
      mcHoverThrottle: uint16_t(PWM) # Multirotor hover throttle PWM value (`currentBatteryProfile->nav.mc.hover_throttle`).

  MSP_SET_NAV_POSHOLD:
    in:
      userControlMode: enum.navUserControlMode_e # Sets `navConfigMutable()->general.flags.user_control_mode`. WARNING: uses unnamed enum in navigation.h 'NAV_GPS_ATTI/NAV_GPS_CRUISE'
      maxAutoSpeed: uint16_t(cm/s) # Sets `navConfigMutable()->general.max_auto_speed`.
      maxAutoClimbRate: uint16_t(cm/s) # Sets `navConfigMutable()->fw.max_auto_climb_rate` or `navConfigMutable()->mc.max_auto_climb_rate` based on `mixerConfig()->platformType`.
      maxManualSpeed: uint16_t(cm/s) # Sets `navConfigMutable()->general.max_manual_speed`.
      maxManualClimbRate: uint16_t(cm/s) # Sets `navConfigMutable()->fw.max_manual_climb_rate` or `navConfigMutable()->mc.max_manual_climb_rate`.
      mcMaxBankAngle: uint8_t(degrees) # Sets `navConfigMutable()->mc.max_bank_angle`.
      mcAltHoldThrottleType: enum.MC_ALT_HOLD # Enum `navMcAltHoldThrottle_e`; updates `navConfigMutable()->mc.althold_throttle_type`.
      mcHoverThrottle: uint16_t(PWM) # Sets `currentBatteryProfileMutable->nav.mc.hover_throttle`.
    out: null

  MSP_CALIBRATION_DATA:
    in: null
    out:
      accCalibAxisFlags: uint8_t(Bitmask) # Bitmask: Flags indicating which axes of the accelerometer have been calibrated (`accGetCalibrationAxisFlags()`)
      accZeroX: int16_t(Raw ADC) # Accelerometer zero offset for X-axis (`accelerometerConfig()->accZero.raw[X]`)
      accZeroY: int16_t(Raw ADC) # Accelerometer zero offset for Y-axis (`accelerometerConfig()->accZero.raw[Y]`)
      accZeroZ: int16_t(Raw ADC) # Accelerometer zero offset for Z-axis (`accelerometerConfig()->accZero.raw[Z]`)
      accGainX: int16_t(Raw ADC) # Accelerometer gain/scale for X-axis (`accelerometerConfig()->accGain.raw[X]`)
      accGainY: int16_t(Raw ADC) # Accelerometer gain/scale for Y-axis (`accelerometerConfig()->accGain.raw[Y]`)
      accGainZ: int16_t(Raw ADC) # Accelerometer gain/scale for Z-axis (`accelerometerConfig()->accGain.raw[Z]`)
      magZeroX: int16_t(Raw ADC) # Magnetometer zero offset for X-axis (`compassConfig()->magZero.raw[X]`). 0 if `USE_MAG` disabled
      magZeroY: int16_t(Raw ADC) # Magnetometer zero offset for Y-axis (`compassConfig()->magZero.raw[Y]`). 0 if `USE_MAG` disabled
      magZeroZ: int16_t(Raw ADC) # Magnetometer zero offset for Z-axis (`compassConfig()->magZero.raw[Z]`). 0 if `USE_MAG` disabled
      opflowScale: uint16_t(Scale * 256) # Optical flow scale factor (`opticalFlowConfig()->opflow_scale * 256`). 0 if `USE_OPFLOW` disabled
      magGainX: int16_t(Raw ADC) # Magnetometer gain/scale for X-axis (`compassConfig()->magGain[X]`). 0 if `USE_MAG` disabled
      magGainY: int16_t(Raw ADC) # Magnetometer gain/scale for Y-axis (`compassConfig()->magGain[Y]`). 0 if `USE_MAG` disabled
      magGainZ: int16_t(Raw ADC) # Magnetometer gain/scale for Z-axis (`compassConfig()->magGain[Z]`). 0 if `USE_MAG` disabled

  MSP_SET_CALIBRATION_DATA:
    in:
      accZeroX: int16_t(Raw ADC) # Sets `accelerometerConfigMutable()->accZero.raw[X]`.
      accZeroY: int16_t(Raw ADC) # Sets `accelerometerConfigMutable()->accZero.raw[Y]`.
      accZeroZ: int16_t(Raw ADC) # Sets `accelerometerConfigMutable()->accZero.raw[Z]`.
      accGainX: int16_t(Raw ADC) # Sets `accelerometerConfigMutable()->accGain.raw[X]`.
      accGainY: int16_t(Raw ADC) # Sets `accelerometerConfigMutable()->accGain.raw[Y]`.
      accGainZ: int16_t(Raw ADC) # Sets `accelerometerConfigMutable()->accGain.raw[Z]`.
      magZeroX: int16_t(Raw ADC) # Sets `compassConfigMutable()->magZero.raw[X]` (if `USE_MAG`)
      magZeroY: int16_t(Raw ADC) # Sets `compassConfigMutable()->magZero.raw[Y]` (if `USE_MAG`)
      magZeroZ: int16_t(Raw ADC) # Sets `compassConfigMutable()->magZero.raw[Z]` (if `USE_MAG`)
      opflowScale: uint16_t(Scale * 256) # Sets `opticalFlowConfigMutable()->opflow_scale = value / 256.0f` (if `USE_OPFLOW`)
      magGainX: int16_t(Raw ADC) # Sets `compassConfigMutable()->magGain[X]` (if `USE_MAG`)
      magGainY: int16_t(Raw ADC) # Sets `compassConfigMutable()->magGain[Y]` (if `USE_MAG`)
      magGainZ: int16_t(Raw ADC) # Sets `compassConfigMutable()->magGain[Z]` (if `USE_MAG`)
    out: null

  MSP_POSITION_ESTIMATION_CONFIG:
    in: null
    out:
      weightZBaroP: uint16_t(Weight * 100) # Barometer Z position fusion weight (`positionEstimationConfig()->w_z_baro_p * 100`)
      weightZGPSP: uint16_t(Weight * 100) # GPS Z position fusion weight (`positionEstimationConfig()->w_z_gps_p * 100`)
      weightZGPSV: uint16_t(Weight * 100) # GPS Z velocity fusion weight (`positionEstimationConfig()->w_z_gps_v * 100`)
      weightXYGPSP: uint16_t(Weight * 100) # GPS XY position fusion weight (`positionEstimationConfig()->w_xy_gps_p * 100`)
      weightXYGPSV: uint16_t(Weight * 100) # GPS XY velocity fusion weight (`positionEstimationConfig()->w_xy_gps_v * 100`)
      minSats: uint8_t(Count) # Minimum satellites required for GPS use (`gpsConfigMutable()->gpsMinSats`)
      useGPSVelNED: uint8_t(Boolean) # Legacy flag, always 1 (GPS velocity is always used if available)

  MSP_SET_POSITION_ESTIMATION_CONFIG:
    in:
      weightZBaroP: uint16_t(Weight * 100) # Sets `positionEstimationConfigMutable()->w_z_baro_p = value / 100.0f` (constrained 0.0-10.0)
      weightZGPSP: uint16_t(Weight * 100) # Sets `positionEstimationConfigMutable()->w_z_gps_p = value / 100.0f` (constrained 0.0-10.0)
      weightZGPSV: uint16_t(Weight * 100) # Sets `positionEstimationConfigMutable()->w_z_gps_v = value / 100.0f` (constrained 0.0-10.0)
      weightXYGPSP: uint16_t(Weight * 100) # Sets `positionEstimationConfigMutable()->w_xy_gps_p = value / 100.0f` (constrained 0.0-10.0)
      weightXYGPSV: uint16_t(Weight * 100) # Sets `positionEstimationConfigMutable()->w_xy_gps_v = value / 100.0f` (constrained 0.0-10.0)
      minSats: uint8_t(Count) # Sets `gpsConfigMutable()->gpsMinSats` (constrained 5-10)
      useGPSVelNED: uint8_t(Boolean) # Legacy flag, ignored
    out: null

  MSP_WP_MISSION_LOAD:
    in:
      missionID: uint8_t # Reserved for future use, currently ignored
    out: null

  MSP_WP_MISSION_SAVE:
    in:
      missionID: uint8_t # Reserved for future use, currently ignored
    out: null

  MSP_WP_GETINFO:
    in: null
    out:
      wpCapabilities: uint8_t # Reserved for future waypoint capabilities flags. Currently always 0
      maxWaypoints: uint8_t # Maximum number of waypoints supported (`NAV_MAX_WAYPOINTS`)
      missionValid: uint8_t # Boolean flag indicating if the current mission in RAM is valid (`isWaypointListValid()`)
      waypointCount: uint8_t # Number of waypoints currently defined in the mission (`getWaypointCount()`)

  MSP_RTH_AND_LAND_CONFIG:
    in: null
    out:
      minRthDistance: uint16_t(cm) # Minimum distance from home required for RTH to engage (`navConfig()->general.min_rth_distance`)
      rthClimbFirst: uint8_t(Boolean) # Flag: Climb to RTH altitude before returning (`navConfig()->general.flags.rth_climb_first`)
      rthClimbIgnoreEmerg: uint8_t(Boolean) # Flag: Climb even in emergency RTH (`navConfig()->general.flags.rth_climb_ignore_emerg`)
      rthTailFirst: uint8_t(Boolean) # Flag: Return tail-first during RTH (`navConfig()->general.flags.rth_tail_first`)
      rthAllowLanding: uint8_t(Boolean) # Flag: Allow automatic landing after RTH (`navConfig()->general.flags.rth_allow_landing`)
      rthAltControlMode: enum.navRthAltControlMode_e # RTH altitude control mode (`navConfig()->general.flags.rth_alt_control_mode`). WARNING: uses unnamed enum in navigation.h:253 'NAV_RTH_NO_ALT...'
      rthAbortThreshold: uint16_t(cm) # Distance increase threshold to abort RTH (`navConfig()->general.rth_abort_threshold`)
      rthAltitude: uint16_t(cm) # Target RTH altitude (`navConfig()->general.rth_altitude`)
      landMinAltVspd: uint16_t(cm/s) # Landing vertical speed at minimum slowdown altitude (`navConfig()->general.land_minalt_vspd`)
      landMaxAltVspd: uint16_t(cm/s) # Landing vertical speed at maximum slowdown altitude (`navConfig()->general.land_maxalt_vspd`)
      landSlowdownMinAlt: uint16_t(cm) # Altitude below which `landMinAltVspd` applies (`navConfig()->general.land_slowdown_minalt`)
      landSlowdownMaxAlt: uint16_t(cm) # Altitude above which `landMaxAltVspd` applies (`navConfig()->general.land_slowdown_maxalt`)
      emergDescentRate: uint16_t(cm/s) # Vertical speed during emergency landing descent (`navConfig()->general.emerg_descent_rate`)

  MSP_SET_RTH_AND_LAND_CONFIG:
    in:
      minRthDistance: uint16_t(cm) # Sets `navConfigMutable()->general.min_rth_distance`.
      rthClimbFirst: uint8_t(Boolean) # Sets `navConfigMutable()->general.flags.rth_climb_first`.
      rthClimbIgnoreEmerg: uint8_t(Boolean) # Sets `navConfigMutable()->general.flags.rth_climb_ignore_emerg`.
      rthTailFirst: uint8_t(Boolean) # Sets `navConfigMutable()->general.flags.rth_tail_first`.
      rthAllowLanding: uint8_t(Boolean) # Sets `navConfigMutable()->general.flags.rth_allow_landing`.
      rthAltControlMode: enum.navRthAltControlMode_e # Sets `navConfigMutable()->general.flags.rth_alt_control_mode`. WARNING: uses unnamed enum in navigation.h:253
      rthAbortThreshold: uint16_t(cm) # Sets `navConfigMutable()->general.rth_abort_threshold`.
      rthAltitude: uint16_t(cm) # Sets `navConfigMutable()->general.rth_altitude`.
      landMinAltVspd: uint16_t(cm/s) # Sets `navConfigMutable()->general.land_minalt_vspd`.
      landMaxAltVspd: uint16_t(cm/s) # Sets `navConfigMutable()->general.land_maxalt_vspd`.
      landSlowdownMinAlt: uint16_t(cm) # Sets `navConfigMutable()->general.land_slowdown_minalt`.
      landSlowdownMaxAlt: uint16_t(cm) # Sets `navConfigMutable()->general.land_slowdown_maxalt`.
      emergDescentRate: uint16_t(cm/s) # Sets `navConfigMutable()->general.emerg_descent_rate`.
    out: null

  MSP_FW_CONFIG:
    in: null
    out:
      cruiseThrottle: uint16_t(PWM) # Cruise throttle command (`currentBatteryProfile->nav.fw.cruise_throttle`).
      minThrottle: uint16_t(PWM) # Minimum throttle during autonomous flight (`currentBatteryProfile->nav.fw.min_throttle`).
      maxThrottle: uint16_t(PWM) # Maximum throttle during autonomous flight (`currentBatteryProfile->nav.fw.max_throttle`).
      maxBankAngle: uint8_t(degrees) # Maximum bank angle allowed (`navConfig()->fw.max_bank_angle`)
      maxClimbAngle: uint8_t(degrees) # Maximum pitch angle during climb (`navConfig()->fw.max_climb_angle`)
      maxDiveAngle: uint8_t(degrees) # Maximum negative pitch angle during descent (`navConfig()->fw.max_dive_angle`)
      pitchToThrottle: uint8_t(us/deg) # Pitch-to-throttle gain (`currentBatteryProfile->nav.fw.pitch_to_throttle`); PWM microseconds per degree (10 units ≈ 1% throttle).
      loiterRadius: uint16_t(cm) # Default loiter radius (`navConfig()->fw.loiter_radius`).

  MSP_SET_FW_CONFIG:
    in:
      cruiseThrottle: uint16_t(PWM) # Sets `currentBatteryProfileMutable->nav.fw.cruise_throttle`.
      minThrottle: uint16_t(PWM) # Sets `currentBatteryProfileMutable->nav.fw.min_throttle`.
      maxThrottle: uint16_t(PWM) # Sets `currentBatteryProfileMutable->nav.fw.max_throttle`.
      maxBankAngle: uint8_t(degrees) # Sets `navConfigMutable()->fw.max_bank_angle`.
      maxClimbAngle: uint8_t(degrees) # Sets `navConfigMutable()->fw.max_climb_angle`.
      maxDiveAngle: uint8_t(degrees) # Sets `navConfigMutable()->fw.max_dive_angle`.
      pitchToThrottle: uint8_t(us/deg) # Sets `currentBatteryProfileMutable->nav.fw.pitch_to_throttle` (PWM microseconds per degree; 10 units ≈ 1% throttle).
      loiterRadius: uint16_t(cm) # Sets `navConfigMutable()->fw.loiter_radius`.
    out: null

  MSP_MODE_RANGES:
    in: null
    out:
      modePermanentId: uint8_t(ID) # Permanent ID of the flight mode (maps to `boxId` via `findBoxByActiveBoxId`). 0 if entry unused
      auxChannelIndex: uint8_t(Index) # 0-based index of the AUX channel used for activation
      rangeStartStep: uint8_t(step) # Start step (0-48). Each step is 25 PWM units; 0 is <=900 and 48 is >=2100.
      rangeEndStep: uint8_t(step) # End step (0-48). Uses the same 25-PWM step mapping as rangeStartStep.

  MSP_SET_MODE_RANGE:
    in:
      rangeIndex: uint8_t(Index) # Index of the mode range to set (0 to `MAX_MODE_ACTIVATION_CONDITION_COUNT - 1`)
      modePermanentId: uint8_t(ID) # Permanent ID of the flight mode to assign
      auxChannelIndex: uint8_t(Index) # 0-based index of the AUX channel
      rangeStartStep: uint8_t(step) # Start step (0-48). Each step is 25 PWM units; 0 is <=900 and 48 is >=2100.
      rangeEndStep: uint8_t(step) # End step (0-48). Uses the same 25-PWM step mapping as rangeStartStep.
    out: null

  MSP_FEATURE:
    in: null
    out:
      featureMask: uint32_t(Bitmask) # Bitmask: active features (see `featureMask()`)

  MSP_SET_FEATURE:
    in:
      featureMask: uint32_t(Bitmask) # Bitmask: features to enable
    out: null

  MSP_BOARD_ALIGNMENT:
    in: null
    out:
      rollAlign: int16_t(deci-degrees) # Board alignment roll angle (`boardAlignment()->rollDeciDegrees`). Negative values tilt left.
      pitchAlign: int16_t(deci-degrees) # Board alignment pitch angle (`boardAlignment()->pitchDeciDegrees`). Negative values nose down.
      yawAlign: int16_t(deci-degrees) # Board alignment yaw angle (`boardAlignment()->yawDeciDegrees`). Negative values rotate counter-clockwise.

  MSP_SET_BOARD_ALIGNMENT:
    in:
      rollAlign: int16_t(deci-degrees) # Sets `boardAlignmentMutable()->rollDeciDegrees`.
      pitchAlign: int16_t(deci-degrees) # Sets `boardAlignmentMutable()->pitchDeciDegrees`.
      yawAlign: int16_t(deci-degrees) # Sets `boardAlignmentMutable()->yawDeciDegrees`.
    out: null

  MSP_CURRENT_METER_CONFIG:
    in: null
    out:
      scale: int16_t(0.1 mV/A) # Current sensor scale factor (`batteryMetersConfig()->current.scale`). Stored in 0.1 mV/A; signed for calibration.
      offset: int16_t(mV) # Current sensor offset (`batteryMetersConfig()->current.offset`). Signed millivolt adjustment.
      type: enum.CURRENT_SENSOR # Enum `currentSensor_e` Type of current sensor hardware
      capacity: uint16_t(mAh (legacy)) # Battery capacity (constrained 0-65535) (`currentBatteryProfile->capacity.value`). Note: This is legacy, use `MSP2_INAV_BATTERY_CONFIG` for full 32-bit capacity

  MSP_SET_CURRENT_METER_CONFIG:
    in:
      scale: int16_t(0.1 mV/A) # Sets `batteryMetersConfigMutable()->current.scale` (0.1 mV/A, signed).
      offset: int16_t(mV) # Sets `batteryMetersConfigMutable()->current.offset` (signed millivolts).
      type: enum.CURRENT_SENSOR # Enum `currentSensor_e` Sets `batteryMetersConfigMutable()->current.type`.
      capacity: uint16_t(mAh (legacy)) # Sets `currentBatteryProfileMutable->capacity.value` (truncated to 16 bits)
    out: null

  MSP_MIXER:
    in: null
    out:
      mixerMode: uint8_t # Always 3 (QuadX) in INAV for compatibility

  MSP_SET_MIXER:
    in:
      mixerMode: uint8_t # Mixer mode to set (ignored by INAV)
    out: null

  MSP_RX_CONFIG:
    in: null
    out:
      serialRxProvider: enum.SERIALRX # Enum `rxSerialReceiverType_e`. Serial RX provider (`rxConfig()->serialrx_provider`).
      maxCheck: uint16_t(PWM) # Upper channel value threshold for stick commands (`rxConfig()->maxcheck`)
      midRc: uint16_t(PWM) # Center channel value (`PWM_RANGE_MIDDLE`, typically 1500)
      minCheck: uint16_t(PWM) # Lower channel value threshold for stick commands (`rxConfig()->mincheck`)
      spektrumSatBind: uint8_t(Count/Flag) # Spektrum bind pulses (`rxConfig()->spektrum_sat_bind`). 0 if `USE_SPEKTRUM_BIND` disabled.
      rxMinUsec: uint16_t(PWM) # Minimum expected pulse width (`rxConfig()->rx_min_usec`)
      rxMaxUsec: uint16_t(PWM) # Maximum expected pulse width (`rxConfig()->rx_max_usec`)
      bfCompatRcInterpolation: uint8_t # BF compatibility. Always 0
      bfCompatRcInterpolationInt: uint8_t # BF compatibility. Always 0
      bfCompatAirModeThreshold: uint16_t # BF compatibility. Always 0
      reserved1: uint8_t # Reserved/Padding. Always 0
      reserved2: uint32_t # Reserved/Padding. Always 0
      reserved3: uint8_t # Reserved/Padding. Always 0
      bfCompatFpvCamAngle: uint8_t # BF compatibility. Always 0
      receiverType: enum.RX_TYPE # Enum `rxReceiverType_e` Receiver type (Parallel PWM, PPM, Serial) ('rxConfig()->receiverType')

  MSP_SET_RX_CONFIG:
    in:
      serialRxProvider: enum.SERIALRX # Enum `rxSerialReceiverType_e`. Sets `rxConfigMutable()->serialrx_provider`.
      maxCheck: uint16_t(PWM) # Sets `rxConfigMutable()->maxcheck`.
      midRc: uint16_t(PWM) # Ignored (`PWM_RANGE_MIDDLE` is used)
      minCheck: uint16_t(PWM) # Sets `rxConfigMutable()->mincheck`.
      spektrumSatBind: uint8_t(Count/Flag) # Sets `rxConfigMutable()->spektrum_sat_bind` (if `USE_SPEKTRUM_BIND`).
      rxMinUsec: uint16_t(PWM) # Sets `rxConfigMutable()->rx_min_usec`.
      rxMaxUsec: uint16_t(PWM) # Sets `rxConfigMutable()->rx_max_usec`.
      bfCompatRcInterpolation: uint8_t # Ignored
      bfCompatRcInterpolationInt: uint8_t # Ignored
      bfCompatAirModeThreshold: uint16_t # Ignored
      reserved1: uint8_t # Ignored
      reserved2: uint32_t # Ignored
      reserved3: uint8_t # Ignored
      bfCompatFpvCamAngle: uint8_t # Ignored
      receiverType: enum.RX_TYPE # Enum `rxReceiverType_e` Sets `rxConfigMutable()->receiverType`.
    out: null

  MSP_LED_COLORS:
    in: null
    out:
      hue: uint16_t # Hue value (0-359)
      saturation: uint8_t # Saturation value (0-255)
      value: uint8_t # Value/Brightness (0-255)

  MSP_SET_LED_COLORS:
    in:
      hue: uint16_t # Hue value (0-359)
      saturation: uint8_t # Saturation value (0-255)
      value: uint8_t # Value/Brightness (0-255)
    out: null

  MSP_LED_STRIP_CONFIG:
    in: null
    out:
      legacyLedConfig: uint32_t # Packed LED configuration (position, function, overlay, color, direction, params). See C code for bit packing details

  MSP_SET_LED_STRIP_CONFIG:
    in:
      ledIndex: uint8_t # Index of the LED to configure (0 to `LED_MAX_STRIP_LENGTH - 1`)
      legacyLedConfig: uint32_t # Packed LED configuration to set
    out: null

  MSP_RSSI_CONFIG:
    in: null
    out:
      rssiChannel: uint8_t # AUX channel index (1-based) used for RSSI, or 0 if disabled (`rxConfig()->rssi_channel`)

  MSP_SET_RSSI_CONFIG:
