    in: null
    out:
      maxVehicles: uint8_t # Maximum number of vehicles tracked (`MAX_ADSB_VEHICLES`). 0 if `USE_ADSB` disabled
      callsignLength: uint8_t # Maximum length of callsign string (`ADSB_CALL_SIGN_MAX_LENGTH`). 0 if `USE_ADSB` disabled
      totalVehicleMsgs: uint32_t # Total vehicle messages received (`getAdsbStatus()->vehiclesMessagesTotal`). 0 if `USE_ADSB` disabled
      totalHeartbeatMsgs: uint32_t # Total heartbeat messages received (`getAdsbStatus()->heartbeatMessagesTotal`). 0 if `USE_ADSB` disabled
      callsign: char[9] # Fixed-length callsign from `adsbVehicle->vehicleValues.callsign` (padded with NULs if shorter).
      icao: uint32_t # ICAO address (`adsbVehicle->vehicleValues.icao`).
      lat: int32_t(1e-7 deg) # Latitude in degrees * 1e7 (`adsbVehicle->vehicleValues.lat`).
      lon: int32_t(1e-7 deg) # Longitude in degrees * 1e7 (`adsbVehicle->vehicleValues.lon`).
      alt: int32_t(cm) # Altitude above sea level (`adsbVehicle->vehicleValues.alt`).
      headingDeg: uint16_t(deg) # Course over ground in whole degrees (`CENTIDEGREES_TO_DEGREES(vehicleValues.heading)`).
      tslc: uint8_t(s) # Time since last communication (`adsbVehicle->vehicleValues.tslc`).
      emitterType: uint8_t # Emitter category (`adsbVehicle->vehicleValues.emitterType`) (refers to enum 'ADSB_EMITTER_TYPE', but none found)
