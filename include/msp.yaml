      response: uint8_t # Sets response characteristic
      damping: uint8_t # Sets damping characteristic
      stability: uint8_t # Sets stability preference
      aggressiveness: uint8_t # Sets aggressiveness preference
      rate: uint8_t # Sets rate setting
