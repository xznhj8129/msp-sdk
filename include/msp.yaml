      posZ: int32_t(cm) # Desired Z in local NEU frame (`posControl.desiredState.pos.z`, up-positive)
      velX: int16_t(cm/s) # Desired X velocity (`posControl.desiredState.vel.x`)
      velY: int16_t(cm/s) # Desired Y velocity (`posControl.desiredState.vel.y`)
      velZ: int16_t(cm/s) # Desired Z velocity (`posControl.desiredState.vel.z`)
      yaw: int32_t(centi-degrees) # Desired heading (`posControl.desiredState.yaw`)
      climbRate: int16_t(cm/s) # Desired climb rate demand (`posControl.desiredState.climbRateDemand`)

