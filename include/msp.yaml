    in: null
    out:
      maxElements: uint8_t # Maximum number of custom elements (`MAX_CUSTOM_ELEMENTS`)
      maxTextLength: uint8_t # Maximum length of the text part (`OSD_CUSTOM_ELEMENT_TEXT_SIZE - 1`)
      maxParts: uint8_t # Maximum number of parts per element (`CUSTOM_ELEMENTS_PARTS`)

  MSP2_INAV_CUSTOM_OSD_ELEMENT:
    in:
      elementIndex: uint8_t # Index of the custom element (0 to `MAX_CUSTOM_ELEMENTS - 1`)
    out:
      partType: enum.CUSTOM_ELEMENT_TYPE # Type of this part
      partValue: uint16_t # Value/ID associated with this part
      visibilityType: enum.CUSTOM_ELEMENT_VISIBILITY # Visibility condition source
      visibilityValue: uint16_t # Value/ID of the visibility condition source
      elementText: char[] # Static text bytes

  MSP2_INAV_SET_CUSTOM_OSD_ELEMENTS:
    in:
      elementIndex: uint8_t # Index of the custom element (0 to `MAX_CUSTOM_ELEMENTS - 1`)
      partType: enum.CUSTOM_ELEMENT_TYPE # Type of this part
      partValue: uint16_t # Value/ID associated with this part
      visibilityType: enum.CUSTOM_ELEMENT_VISIBILITY # Visibility condition source
      visibilityValue: uint16_t # Value/ID of the visibility condition source
      elementText: char[] # Raw bytes
    out: null

