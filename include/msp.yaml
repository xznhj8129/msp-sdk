      angleTargetRoll: int16_t(deci-degrees) # Angle target in deci-degrees. Roll/Pitch clamped to configured angle limits
      angleTargetPitch: int16_t(deci-degrees) # Angle target in deci-degrees. Roll/Pitch clamped to configured angle limits
      angleTargetYaw: int16_t(deci-degrees) # Angle target in deci-degrees. Yaw clamped to 0–3600.
    out: null

  MSP2_INAV_FLIGHT_AXIS_RATE_OVERRIDE:
    in:
      overrideMask: uint8_t(Bitmask) # Bitmask of desired-state fields that follow (Roll, Pitch, Yaw). Non-zero enables the override; zero disables it for that axis.
      rateTargetRoll: int16_t(deg/s) # Rate target, clamped to ±2000
      rateTargetPitch: int16_t(deg/s) # Rate target, clamped to ±2000
      rateTargetYaw: int16_t(deg/s) # Rate target, clamped to ±2000
    out: null

