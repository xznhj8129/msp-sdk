# PlatformIO test project for the MSP SDK for INAV Arduino library.
# Builds the bundled example sketch against the library root (../..) to prove
# the staged library compiles standalone.

[platformio]
src_dir = ../../examples/inav_demo

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps = file://../..
build_flags =
  -D FC_SERIAL_NUM=2
  -D FC_RX_PIN=16
  -D FC_TX_PIN=17

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps = file://../..
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_HW_CDC
  -D ARDUINO_USB_MODE=1
